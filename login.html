<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Login - Ludo Cam</title>
    <style>
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            padding: 20px;
        }
        .login-box {
            background: #0f0f0f;
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            border: 1px solid #222;
        }
        h1 {
            color: #fff;
            margin-bottom: 10px;
        }
        h1 span {
            color: #00ff88;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .error {
            color: #ff4444;
            margin-top: 15px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>📸 <span>LUDO</span> CAM</h1>
        <p>Enter password to continue</p>
        <input type="password" id="password" placeholder="Password">
        <button onclick="check()">UNLOCK</button>
        <div id="error" class="error"></div>
    </div>

    <script>
        function check() {
            const pwd = document.getElementById('password').value;
            if (pwd === "hackerbabu") {
                window.location.href = "index.html";
            } else {
                document.getElementById('error').innerText = "❌ Wrong password!";
            }
        }
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') check();
        });
    </script>
</body>
</html>
