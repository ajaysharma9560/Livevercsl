<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ludo Cam - My Photos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #141414;
            border-radius: 20px;
            border: 1px solid #222;
        }

        h1 {
            color: #fff;
            font-size: 28px;
        }

        h1 span {
            color: #00ff88;
        }

        .status {
            text-align: center;
            color: #ffaa00;
            margin-bottom: 20px;
            font-size: 14px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 12px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .photo-card {
            background: #0f0f0f;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .photo-card img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
        }

        .photo-info {
            padding: 12px;
            color: #888;
            font-size: 12px;
            text-align: center;
            border-top: 1px solid #222;
        }

        .refresh-btn {
            display: block;
            margin: 20px auto;
            padding: 12px 24px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            color: #888;
            padding: 40px;
        }

        .no-photos {
            text-align: center;
            color: #555;
            padding: 40px;
        }

        .footer {
            text-align: center;
            color: #444;
            font-size: 11px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📸 <span>LUDO</span> CAM</h1>
    </div>

    <div class="status" id="status">📡 Loading photos...</div>

    <div class="photo-grid" id="photoGrid">
        <div class="loading">Loading...</div>
    </div>

    <button class="refresh-btn" onclick="loadPhotos()">⟳ REFRESH</button>

    <div class="footer">
        🔒 Auto-refresh every 10 seconds
    </div>

    <script>
        // 🔥 APNA CLOUDINARY CONFIG 🔥
        const CLOUD_NAME = "dypwj2dhh";
        const FOLDER = "live_cams";

        async function loadPhotos() {
            const grid = document.getElementById('photoGrid');
            const statusDiv = document.getElementById('status');
            
            statusDiv.innerHTML = "📡 Fetching photos...";
            grid.innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                // Try direct Cloudinary API
                const url = `https://res.cloudinary.com/${CLOUD_NAME}/image/list/${FOLDER}.json`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.error) {
                    statusDiv.innerHTML = "⚠️ Cloudinary public access disabled. Enable 'Resource list' in Settings → Security";
                    grid.innerHTML = '<div class="no-photos">🔒 Cloudinary API not public. Enable resource list in Cloudinary settings.</div>';
                    return;
                }
                
                if (data.resources && data.resources.length > 0) {
                    const photos = [...data.resources].reverse();
                    statusDiv.innerHTML = `✅ ${photos.length} photos found`;
                    
                    grid.innerHTML = photos.map(photo => `
                        <div class="photo-card">
                            <img src="${photo.secure_url}" alt="Photo" loading="lazy" onclick="window.open('${photo.secure_url}','_blank')">
                            <div class="photo-info">
                                📅 ${new Date(photo.created_at).toLocaleString()}
                            </div>
                        </div>
                    `).join('');
                } else {
                    statusDiv.innerHTML = "📭 No photos yet";
                    grid.innerHTML = '<div class="no-photos">No photos found. Capture some photos first.</div>';
                }
            } catch (error) {
                console.error(error);
                statusDiv.innerHTML = "❌ Error: Cloudinary API not accessible";
                grid.innerHTML = '<div class="no-photos">⚠️ Error loading photos. Make sure Cloudinary "Resource list" is enabled in Settings → Security.</div>';
            }
        }

        loadPhotos();
        setInterval(loadPhotos, 10000);
    </script>
</body>
</html>
