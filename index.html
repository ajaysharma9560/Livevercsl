<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LiveCam - Remote Camera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(20, 20, 30, 0.95);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header {
            padding: 20px 24px;
            background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.3));
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .title {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #00ff88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.6);
            padding: 6px 14px;
            border-radius: 40px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .dot.offline { background: #ff4444; box-shadow: 0 0 8px #ff4444; }
        .dot.online { background: #00ff88; box-shadow: 0 0 12px #00ff88; }
        .status-text { font-size: 13px; color: #fff; }
        .device-info {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
        }
        .device-name { color: #00ff88; font-weight: 500; }
        .video-section { padding: 20px; background: #000; }
        .video-wrapper {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            border: 1px solid rgba(255,255,255,0.1);
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .placeholder {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            gap: 12px;
        }
        .hidden { display: none; }
        .controls {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            min-width: 120px;
        }
        .btn-play { background: linear-gradient(135deg, #00ff88, #00aa55); color: #000; }
        .btn-stop { background: linear-gradient(135deg, #ff4444, #aa0000); color: #fff; }
        .footer {
            padding: 12px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 10px;
            color: #555;
        }
        .relative { position: relative; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">
                <div class="logo">📹 LiveCam</div>
                <div class="status-pill">
                    <div class="dot offline" id="statusDot"></div>
                    <span class="status-text" id="statusText">Disconnected</span>
                </div>
            </div>
            <div class="device-info">
                <span>📱 <span id="deviceName" class="device-name">—</span></span>
                <span>🆔 <span id="deviceId">No device</span></span>
            </div>
        </div>

        <div class="video-section">
            <div class="video-wrapper relative">
                <video id="remoteVideo" autoplay playsinline muted></video>
                <div class="placeholder" id="placeholder">
                    <div>📷</div>
                    <div>No active stream</div>
                    <div style="font-size: 11px;">Tap PLAY to start</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-play" id="playBtn">▶ PLAY</button>
            <button class="btn btn-stop" id="stopBtn">⏹ STOP</button>
        </div>

        <div class="footer">
            <span id="timer">00:00:00</span> • 🔒 WebRTC
        </div>
    </div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script>
        const ROOM_ID = "camera_room_123";
        const SIGNAL_SERVER = "https://server-2-hwtd.onrender.com";
        
        const remoteVideo = document.getElementById('remoteVideo');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const deviceNameSpan = document.getElementById('deviceName');
        const deviceIdSpan = document.getElementById('deviceId');
        const placeholder = document.getElementById('placeholder');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const timerSpan = document.getElementById('timer');
        
        let pc = null;
        let socket = null;
        let isStreaming = false;
        let startTime = null;
        let timerInterval = null;
        let phoneConnected = false;
        
        const configuration = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" },
                {
                    urls: "turn:openrelay.metered.ca:80",
                    username: "openrelayproject",
                    credential: "openrelayproject"
                },
                {
                    urls: "turn:openrelay.metered.ca:443",
                    username: "openrelayproject",
                    credential: "openrelayproject"
                }
            ]
        };
        
        function updateTimer() {
            if (!startTime) { timerSpan.innerText = "00:00:00"; return; }
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            timerSpan.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            startTime = Date.now();
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }
        
        function stopTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            startTime = null;
            timerSpan.innerText = "00:00:00";
        }
        
        function setConnected(deviceName = null, deviceId = null) {
            statusDot.className = 'dot online';
            statusText.innerText = 'Connected';
            if (deviceName) deviceNameSpan.innerText = deviceName;
            if (deviceId) deviceIdSpan.innerText = deviceId;
        }
        
        function setDisconnected() {
            statusDot.className = 'dot offline';
            statusText.innerText = 'Disconnected';
            deviceNameSpan.innerText = '—';
            deviceIdSpan.innerText = 'No device';
            phoneConnected = false;
            if (remoteVideo.srcObject) { remoteVideo.srcObject = null; }
            placeholder.classList.remove('hidden');
            isStreaming = false;
            stopTimer();
        }
        
        function startStreamDisplay() {
            if (isStreaming) return;
            isStreaming = true;
            placeholder.classList.add('hidden');
            startTimer();
        }
        
        function stopStreamDisplay() {
            isStreaming = false;
            placeholder.classList.remove('hidden');
            stopTimer();
        }
        
        async function createPeerConnection() {
            if (pc) { pc.close(); }
            pc = new RTCPeerConnection(configuration);
            
            pc.ontrack = (event) => {
                if (event.track.kind === 'video') {
                    const stream = event.streams[0];
                    if (remoteVideo.srcObject !== stream) {
                        remoteVideo.srcObject = stream;
                        remoteVideo.play().catch(e => console.log(e));
                    }
                    startStreamDisplay();
                }
            };
            
            pc.onicecandidate = (event) => {
                if (event.candidate && socket && socket.connected) {
                    socket.emit('signal', { room: ROOM_ID, from: 'web', signal: event.candidate });
                }
            };
            
            pc.oniceconnectionstatechange = () => {
                if (pc.iceConnectionState === 'connected') {
                    setConnected();
                } else if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                    stopStreamDisplay();
                }
            };
            return pc;
        }
        
        async function startWebRTC() {
            if (!phoneConnected) {
                alert("❌ No phone connected! Open APK first.");
                return;
            }
            if (!pc) await createPeerConnection();
            
            const offer = await pc.createOffer({
                offerToReceiveVideo: true,
                offerToReceiveAudio: false
            });
            await pc.setLocalDescription(offer);
            if (socket && socket.connected) {
                socket.emit('signal', { room: ROOM_ID, from: 'web', signal: offer });
            }
        }
        
        function stopWebRTC() {
            if (pc) { pc.close(); pc = null; }
            if (remoteVideo.srcObject) { remoteVideo.srcObject = null; }
            stopStreamDisplay();
        }
        
        function initSocket() {
            if (socket) { socket.disconnect(); }
            socket = io(SIGNAL_SERVER, { transports: ['websocket'], reconnection: true });
            
            socket.on('connect', () => { socket.emit('join-room', ROOM_ID, 'web'); });
            
            socket.on('user-joined', (userId) => {
                phoneConnected = true;
                setConnected('OPPO CPH2061', userId.substring(0, 8));
            });
            
            socket.on('signal', async (data) => {
                if (!pc) await createPeerConnection();
                if (data.signal.type === 'answer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
                } else if (data.signal.candidate) {
                    await pc.addIceCandidate(new RTCIceCandidate(data.signal));
                }
            });
            
            socket.on('user-left', () => { phoneConnected = false; stopWebRTC(); setDisconnected(); });
            socket.on('disconnect', () => { setDisconnected(); });
        }
        
        // ✅ PLAY button click → sidha live stream start
        playBtn.addEventListener('click', () => { startWebRTC(); });
        stopBtn.addEventListener('click', () => { stopWebRTC(); });
        
        setDisconnected();
        initSocket();
        
        console.log("✅ Website ready — PLAY button se live stream chalu ho jayega!");
    </script>
</body>
</html>
