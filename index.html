<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔴 LIVE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        /* Main container */
        .live-container {
            position: relative;
            width: 100%;
            max-width: 550px;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
        }

        /* Video player - minimal controls */
        .live-video {
            width: 100%;
            height: auto;
            max-height: 60vh;
            object-fit: contain;
            display: block;
            background: #000;
        }

        /* LIVE Badge - Blinking */
        .live-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #ff0000;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 30px;
            letter-spacing: 1px;
            z-index: 100;
            font-family: monospace;
            box-shadow: 0 0 10px rgba(255,0,0,0.5);
            animation: blink 1.2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; background: #ff0000; }
            50% { opacity: 0.7; background: #cc0000; }
            100% { opacity: 1; background: #ff0000; }
        }

        /* Controls Bar */
        .controls-bar {
            background: #1a1a1a;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: monospace;
        }

        .btn-play {
            background: #00ff88;
            color: #000;
        }

        .btn-play:hover {
            background: #00cc6e;
            transform: scale(1.02);
        }

        .btn-stop {
            background: #ff4444;
            color: #fff;
        }

        .btn-stop:hover {
            background: #cc0000;
            transform: scale(1.02);
        }

        /* Quality Selector */
        .quality-section {
            background: #1a1a1a;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
            gap: 10px;
        }

        .quality-label {
            color: #888;
            font-size: 12px;
            font-family: monospace;
        }

        .quality-select {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            padding: 8px 16px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 12px;
            font-family: monospace;
        }

        .quality-select:hover {
            background: #333;
        }

        /* Status Row */
        .status-row {
            background: #111;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            font-family: monospace;
            color: #555;
            border-bottom: 1px solid #222;
        }

        .online-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
            transition: all 0.2s;
        }

        .status-dot.green {
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
        }

        .status-text {
            color: #fff;
            font-size: 10px;
        }

        .device-name {
            color: #00ff88;
            font-size: 10px;
        }

        /* Hide default video controls */
        video::-webkit-media-controls {
            display: none !important;
        }
        video::-webkit-media-controls-enclosure {
            display: none !important;
        }
        video::-webkit-media-controls-panel {
            display: none !important;
        }

        /* No video message */
        .no-video {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            color: #333;
            font-size: 12px;
            font-family: monospace;
        }

        .hidden {
            display: none !important;
        }

        /* Video wrapper for relative positioning */
        .video-wrapper {
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
        }
    </style>
</head>
<body>

<div class="live-container">
    <!-- Video Section -->
    <div class="video-wrapper">
        <video id="liveVideo" class="live-video" autoplay muted playsinline disablePictureInPicture></video>
        <div class="live-badge">🔴 LIVE</div>
        <div class="no-video hidden" id="noVideo">Connecting to stream...</div>
    </div>

    <!-- Status Row -->
    <div class="status-row">
        <div class="online-status">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">Offline</span>
        </div>
        <div class="device-name" id="deviceName">—</div>
    </div>

    <!-- Quality Section -->
    <div class="quality-section">
        <span class="quality-label">🎥 STREAM QUALITY</span>
        <select class="quality-select" id="qualitySelect">
            <option value="120p">120p (Low)</option>
            <option value="240p">240p</option>
            <option value="360p" selected>360p (Default)</option>
            <option value="480p">480p (HD)</option>
            <option value="720p">720p (HD+)</option>
        </select>
    </div>

    <!-- Controls Bar -->
    <div class="controls-bar">
        <button class="btn btn-play" id="playBtn">▶ PLAY</button>
        <button class="btn btn-stop" id="stopBtn">⏹ STOP</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script>
    // ============================================================
    // LIVE FEEL WEBSITE - With Play, Stop, Quality Controls
    // ============================================================
    
    const firebaseConfig = {
        apiKey: "AIzaSyBwDAhUS8iqNsM5rMewtwFnQs-s3FcnaoU",
        authDomain: "livecam-4e8b0.firebaseapp.com",
        databaseURL: "https://livecam-4e8b0-default-rtdb.firebaseio.com",
        projectId: "livecam-4e8b0",
        storageBucket: "livecam-4e8b0.firebasestorage.app",
        messagingSenderId: "315485454659",
        appId: "1:315485454659:android:e5d69c3b9a1a87854c2ff6"
    };

    const API_URL = "/api/photos";

    // DOM Elements
    const video = document.getElementById('liveVideo');
    const noVideoDiv = document.getElementById('noVideo');
    const playBtn = document.getElementById('playBtn');
    const stopBtn = document.getElementById('stopBtn');
    const qualitySelect = document.getElementById('qualitySelect');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const deviceNameSpan = document.getElementById('deviceName');
    
    // Video queue for seamless transition
    let videoQueue = [];
    let currentVideoUrl = null;
    let isPlaying = false;
    let isWaitingForVideo = false;
    let deviceId = null;
    let currentQuality = "360p";
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ============================================================
    // FIREBASE: GET DEVICE STATUS & ONLINE STATUS
    // ============================================================
    database.ref('ludo_cam/devices').on('value', (snapshot) => {
        const devices = snapshot.val();
        let isOnline = false;
        let onlineDeviceName = "";

        for (const [id, device] of Object.entries(devices || {})) {
            if (device.online === true) {
                isOnline = true;
                onlineDeviceName = device.deviceName || "Camera";
                deviceId = id;
                break;
            }
        }

        if (isOnline) {
            statusDot.className = 'status-dot green';
            statusText.innerText = 'LIVE';
            deviceNameSpan.innerText = `📱 ${onlineDeviceName}`;
        } else {
            statusDot.className = 'status-dot';
            statusText.innerText = 'Offline';
            deviceNameSpan.innerText = '—';
        }
    });

    // ============================================================
    // SEND QUALITY COMMAND TO ANDROID APP
    // ============================================================
    function sendQualityCommand(quality) {
        if (!deviceId) {
            console.log('No device connected yet');
            return;
        }
        currentQuality = quality;
        database.ref(`ludo_cam/commands/${deviceId}`).set({ 
            quality: quality,
            timestamp: Date.now()
        });
        console.log('Quality command sent:', quality);
    }

    qualitySelect.addEventListener('change', (e) => {
        sendQualityCommand(e.target.value);
    });

    // ============================================================
    // PLAY BUTTON - Manually start video
    // ============================================================
    playBtn.addEventListener('click', () => {
        if (video.src && video.paused) {
            video.play().then(() => {
                isPlaying = true;
                console.log('Video played manually');
            }).catch(e => console.log('Play error:', e));
        } else if (videoQueue.length > 0 && !isPlaying) {
            playNextVideo();
        }
    });

    // ============================================================
    // STOP BUTTON - Pause video
    // ============================================================
    stopBtn.addEventListener('click', () => {
        if (video.src && !video.paused) {
            video.pause();
            isPlaying = false;
            console.log('Video stopped manually');
        }
    });

    // ============================================================
    // FETCH LATEST VIDEOS FROM API
    // ============================================================
    async function fetchLatestVideos() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();

            if (data.success && data.videos && data.videos.length > 0) {
                noVideoDiv.classList.add('hidden');
                
                // Get all videos and add to queue (only new ones)
                for (const videoData of data.videos) {
                    if (videoData.url !== currentVideoUrl) {
                        currentVideoUrl = videoData.url;
                        videoQueue.push(videoData.url);
                    }
                }
                
                // Keep only last 3 videos in queue
                if (videoQueue.length > 3) {
                    videoQueue = videoQueue.slice(-3);
                }
                
                // Start playing if not already and not manually stopped
                if (!isPlaying && !isWaitingForVideo && videoQueue.length > 0 && !video.paused === false) {
                    playNextVideo();
                }
            } else {
                if (videoQueue.length === 0 && !isPlaying) {
                    noVideoDiv.classList.remove('hidden');
                }
            }
        } catch(e) {
            console.log('Silent fetch error');
        }
    }

    // ============================================================
    // PLAY NEXT VIDEO - SEAMLESS TRANSITION
    // ============================================================
    function playNextVideo() {
        if (videoQueue.length === 0) {
            isWaitingForVideo = true;
            return;
        }
        
        // Don't auto-play if user manually stopped
        if (video.paused && !isPlaying) {
            return;
        }
        
        isWaitingForVideo = false;
        const nextVideoUrl = videoQueue.shift();
        
        // Smooth fade transition
        video.style.transition = 'opacity 0.3s ease';
        video.style.opacity = '0';
        
        setTimeout(() => {
            video.src = nextVideoUrl;
            video.load();
            
            // Autoplay
            const playPromise = video.play();
            
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    video.style.opacity = '1';
                    
                    setTimeout(() => {
                        video.style.transition = '';
                    }, 350);
                }).catch(() => {
                    // Autoplay blocked - show play button hint
                    video.style.opacity = '1';
                    isPlaying = false;
                });
            }
        }, 100);
    }

    // ============================================================
    // WHEN VIDEO ENDS - AUTOMATICALLY PLAY NEXT
    // ============================================================
    video.addEventListener('ended', () => {
        isPlaying = false;
        
        if (videoQueue.length > 0 && !video.paused) {
            // Play next video immediately
            playNextVideo();
        } else if (videoQueue.length === 0) {
            isWaitingForVideo = true;
        }
    });

    // ============================================================
    // VIDEO ERROR HANDLING
    // ============================================================
    video.addEventListener('error', () => {
        console.log('Video error, skipping to next');
        isPlaying = false;
        if (videoQueue.length > 0) {
            playNextVideo();
        }
    });

    // ============================================================
    // POLL EVERY 3 SECONDS FOR NEW VIDEOS
    // ============================================================
    
    // Initial fetch
    fetchLatestVideos();
    
    // Poll every 3 seconds for new videos
    setInterval(fetchLatestVideos, 3000);
    
    // Poll device status every 5 seconds
    setInterval(() => {
        if (deviceId) {
            database.ref(`ludo_cam/commands/${deviceId}`).once('value', (snapshot) => {
                const cmd = snapshot.val();
                if (cmd && cmd.quality) {
                    console.log('Quality acknowledged:', cmd.quality);
                }
            });
        }
    }, 5000);
    
    // ============================================================
    // HIDE DEFAULT CONTROLS
    // ============================================================
    video.controls = false;
    video.removeAttribute('controls');
    
    // Disable right-click on video
    video.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        return false;
    });
    
    console.log('Live stream ready - Play, Stop, Quality controls available');
</script>
</body>
</html>
