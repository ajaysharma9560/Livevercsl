<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Controller</title>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>
body { background:#0f172a; color:white; font-family:system-ui; padding:20px; }

.container { max-width:500px; margin:auto; }

h2 { text-align:center; }

.status {
  text-align:center;
  margin-bottom:10px;
  color:#22c55e;
}

.video {
  width:100%;
  aspect-ratio:16/9;
  background:black;
  border-radius:16px;
  overflow:hidden;
  margin-bottom:15px;
  border:2px solid #22c55e;
}

.video img {
  width:100%;
  height:100%;
  object-fit:contain;
}

/* BUTTONS */
.btn {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
}

.start { background:#22c55e; color:white; }
.stop { background:#ef4444; color:white; }
.flip { background:#3b82f6; color:white; }
.capture { background:#f59e0b; color:white; }
.flash { background:#a855f7; color:white; }
.zoom { background:#14b8a6; color:white; }
.reload { background:#64748b; color:white; }

.row {
  display:flex;
  gap:8px;
}

.row .btn {
  flex:1;
}
</style>

</head>

<body>

<div class="container">

<h2>📷 Camera Controller</h2>

<div class="status" id="status">Connecting...</div>

<!-- STREAM -->
<div class="video">
  <img id="streamImg" src="https://0c2c3946-ed81-426e-b5d0-2938f8a721f8-00-2xrleh1hnov2d.pike.replit.dev/stream">
</div>

<!-- COMMAND BUTTONS -->

<div class="row">
  <button class="btn start" onclick="send('start')">▶ START</button>
  <button class="btn stop" onclick="send('stop')">⏹ STOP</button>
</div>

<div class="row">
  <button class="btn flip" onclick="send('flip')">🔄 FLIP</button>
  <button class="btn capture" onclick="send('capture')">📸 CAPTURE</button>
</div>

<div class="row">
  <button class="btn flash" onclick="send('flash_on')">⚡ FLASH ON</button>
  <button class="btn flash" onclick="send('flash_off')">⚡ FLASH OFF</button>
</div>

<div class="row">
  <button class="btn zoom" onclick="send('zoom_in')">➕ ZOOM IN</button>
  <button class="btn zoom" onclick="send('zoom_out')">➖ ZOOM OUT</button>
</div>

<button class="btn reload" onclick="reloadStream()">🔄 RELOAD STREAM</button>

</div>

<script>

const socket = io("https://0c2c3946-ed81-426e-b5d0-2938f8a721f8-00-2xrleh1hnov2d.pike.replit.dev");

// status
socket.on("connect", () => {
  document.getElementById("status").innerText = "🟢 Live Connected";
});

socket.on("disconnect", () => {
  document.getElementById("status").innerText = "🔴 Disconnected";
});

// send command
function send(cmd){
  fetch("https://0c2c3946-ed81-426e-b5d0-2938f8a721f8-00-2xrleh1hnov2d.pike.replit.dev/command", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ command: cmd })
  });
}

// reload stream
function reloadStream(){
  const img = document.getElementById("streamImg");
  img.src = img.src.split("?")[0] + "?" + Date.now();
}

</script>

</body>
</html>
