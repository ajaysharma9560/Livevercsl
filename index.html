<!DOCTYPE html>
<html>
<head>
    <title>Ludoo Config Server</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        .container {
            padding: 40px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }
        h1 { font-size: 3em; margin: 0; }
        p { font-size: 1.2em; opacity: 0.9; }
        .status { color: #4ade80; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Ludoo Config Server</h1>
        <p>Status: <span class="status">● Running</span></p>
        <p>This server is used by Ludoo Android App</p>
        <p>Version: 1.0.0</p>
    </div>
</body>
</html>
