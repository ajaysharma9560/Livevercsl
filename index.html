<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Test</title>
    <style>
        body {
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        video {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 12px;
        }
        .info {
            color: white;
            text-align: center;
            margin-top: 20px;
            font-family: monospace;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            background: #00ff88;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div>
        <video id="myVideo" controls autoplay></video>
        <div class="info">
            <p id="status">Loading video...</p>
            <button onclick="tryAgain()">Try Again</button>
        </div>
    </div>

    <script>
        // 🔥 YAHAN APNA CLOUDINARY VIDEO URL DALO 🔥
        // Example: "https://res.cloudinary.com/你的cloud名称/video/upload/你的视频id.mp4"
        
        const VIDEO_URL = "https://res.cloudinary.com/demo/video/upload/sample.mp4";
        
        const video = document.getElementById('myVideo');
        const statusEl = document.getElementById('status');
        
        function loadVideo() {
            statusEl.innerText = 'Loading video...';
            video.src = VIDEO_URL;
            video.load();
        }
        
        video.addEventListener('canplay', () => {
            statusEl.innerText = '✅ Video loaded! Playing...';
            video.play().catch(e => statusEl.innerText = 'Error: ' + e.message);
        });
        
        video.addEventListener('error', (e) => {
            statusEl.innerText = '❌ Video failed! Check URL: ' + VIDEO_URL;
            console.error('Video error:', e);
        });
        
        function tryAgain() {
            loadVideo();
        }
        
        loadVideo();
    </script>
</body>
</html>
