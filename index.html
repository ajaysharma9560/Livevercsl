<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ludo Cam - My Photos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #141414;
            border-radius: 20px;
            border: 1px solid #222;
        }

        h1 {
            color: #fff;
            font-size: 28px;
        }

        h1 span {
            color: #00ff88;
        }

        .status {
            text-align: center;
            color: #00ff88;
            margin-bottom: 20px;
            font-size: 14px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 12px;
        }

        .status.error {
            color: #ff4444;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .photo-card {
            background: #0f0f0f;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #222;
            transition: transform 0.2s;
        }

        .photo-card:active {
            transform: scale(0.98);
        }

        .photo-card img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
            cursor: pointer;
        }

        .photo-info {
            padding: 12px;
            color: #888;
            font-size: 12px;
            text-align: center;
            border-top: 1px solid #222;
        }

        .refresh-btn {
            display: block;
            margin: 20px auto;
            padding: 12px 24px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .refresh-btn:active {
            transform: scale(0.97);
        }

        .loading {
            text-align: center;
            color: #888;
            padding: 40px;
        }

        .no-photos {
            text-align: center;
            color: #555;
            padding: 40px;
        }

        .footer {
            text-align: center;
            color: #444;
            font-size: 11px;
            margin-top: 30px;
        }

        /* Lightbox for fullscreen */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📸 <span>LUDO</span> CAM</h1>
    </div>

    <div class="status" id="status">📡 Loading photos...</div>

    <div class="photo-grid" id="photoGrid">
        <div class="loading">Loading...</div>
    </div>

    <button class="refresh-btn" onclick="loadPhotos()">⟳ REFRESH</button>

    <div class="footer">
        🔒 Auto-refresh every 10 seconds • Tap photo to enlarge
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img id="lightboxImg" src="">
    </div>

    <script>
        // 🔥 API CALL — VERCEL SERVERLESS FUNCTION 🔥
        const API_URL = "/api/photos";

        async function loadPhotos() {
            const grid = document.getElementById('photoGrid');
            const statusDiv = document.getElementById('status');
            
            statusDiv.className = 'status';
            statusDiv.innerHTML = "📡 Fetching photos...";
            grid.innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (data.success && data.photos && data.photos.length > 0) {
                    const photos = [...data.photos].reverse();
                    statusDiv.innerHTML = `✅ ${data.count} photos found • Last: ${new Date(photos[0].created_at).toLocaleTimeString()}`;
                    
                    grid.innerHTML = photos.map(photo => `
                        <div class="photo-card">
                            <img src="${photo.secure_url}" alt="Photo" loading="lazy" onclick="openLightbox('${photo.secure_url}')">
                            <div class="photo-info">
                                📅 ${new Date(photo.created_at).toLocaleString()}
                            </div>
                        </div>
                    `).join('');
                } else if (data.photos && data.photos.length === 0) {
                    statusDiv.innerHTML = "📭 No photos yet. Capture some photos first.";
                    grid.innerHTML = '<div class="no-photos">📭 No photos found</div>';
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = "❌ " + (data.error || "Failed to load photos");
                    grid.innerHTML = '<div class="no-photos">⚠️ Error loading photos</div>';
                }
            } catch (error) {
                console.error('Error:', error);
                statusDiv.className = 'status error';
                statusDiv.innerHTML = "❌ Connection error: " + error.message;
                grid.innerHTML = '<div class="no-photos">⚠️ Cannot connect to server</div>';
            }
        }

        // Lightbox functions
        function openLightbox(imageUrl) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            lightboxImg.src = imageUrl;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        // Initial load and auto-refresh
        loadPhotos();
        setInterval(loadPhotos, 10000);
    </script>
</body>
</html>
