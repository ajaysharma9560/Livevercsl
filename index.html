<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live Cam - Ludo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #0f0f0f;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid #222;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* Header */
        .header {
            padding: 20px;
            background: #141414;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }

        .logo span {
            color: #00ff88;
        }

        /* Status Bar */
        .status-bar {
            padding: 12px 20px;
            background: #0f0f0f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .dot.red {
            background: #ff4444;
            box-shadow: 0 0 8px #ff4444;
        }

        .dot.green {
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
        }

        .status-text {
            color: #fff;
            font-size: 12px;
            font-weight: 500;
        }

        .device-name {
            color: #00ff88;
            font-size: 11px;
            font-family: monospace;
        }

        /* Video Section */
        .video-section {
            padding: 20px;
            background: #000;
        }

        .video-title {
            color: #888;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .video-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .video-card {
            background: #0a0a0a;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #222;
        }

        video {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background: #000;
        }

        .video-info {
            padding: 10px;
            color: #666;
            font-size: 11px;
            text-align: center;
            border-top: 1px solid #222;
        }

        /* Footer */
        .footer {
            padding: 12px;
            text-align: center;
            font-size: 10px;
            color: #444;
            border-top: 1px solid #222;
        }

        .loading {
            text-align: center;
            color: #888;
            padding: 40px;
        }

        .no-videos {
            text-align: center;
            color: #555;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">📹 <span>LUDO</span> CAM</div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">
                <div class="dot red" id="statusDot"></div>
                <span class="status-text" id="statusText">Offline</span>
            </div>
            <div class="device-name" id="deviceName">—</div>
        </div>

        <!-- Video Section -->
        <div class="video-section">
            <div class="video-title">📹 LATEST STREAMS</div>
            <div class="video-list" id="videoList">
                <div class="loading">Loading videos...</div>
            </div>
        </div>

        <div class="footer">
            🔒 Live Camera Stream • Auto-refresh every 10 sec
        </div>
    </div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script>
        // ========== CONFIGURATION ==========
        const SIGNAL_SERVER = "https://server-2-hwtd.onrender.com";
        const CLOUD_NAME = "dypwj2dhh";
        const FOLDER = "live_cams";
        // ====================================

        // DOM Elements
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const deviceNameSpan = document.getElementById('deviceName');
        const videoList = document.getElementById('videoList');

        // ========== ONLINE STATUS (SOCKET.IO) ==========
        const socket = io(SIGNAL_SERVER);

        socket.on('status', (data) => {
            if (data.online) {
                statusDot.className = 'dot green';
                statusText.innerText = 'Online';
                deviceNameSpan.innerText = `📱 ${data.deviceName}`;
            } else {
                statusDot.className = 'dot red';
                statusText.innerText = 'Offline';
                deviceNameSpan.innerText = '—';
            }
        });

        // ========== FETCH VIDEOS FROM CLOUDINARY ==========
        async function fetchVideos() {
            try {
                const response = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/video/list/${FOLDER}.json`);
                const data = await response.json();
                
                if (data.resources && data.resources.length > 0) {
                    // Show latest first
                    const videos = data.resources.reverse();
                    
                    videoList.innerHTML = videos.map(video => `
                        <div class="video-card">
                            <video controls autoplay muted loop>
                                <source src="${video.secure_url}" type="video/mp4">
                            </video>
                            <div class="video-info">
                                📅 ${new Date(video.created_at).toLocaleString()}
                            </div>
                        </div>
                    `).join('');
                } else {
                    videoList.innerHTML = '<div class="no-videos">📭 No videos yet. Waiting for stream...</div>';
                }
            } catch (error) {
                console.error('Error fetching videos:', error);
                videoList.innerHTML = '<div class="no-videos">⚠️ Error loading videos</div>';
            }
        }

        // Fetch videos immediately and every 10 seconds
        fetchVideos();
        setInterval(fetchVideos, 10000);
        
        console.log('✅ Website ready - Live camera stream');
    </script>
</body>
</html>
