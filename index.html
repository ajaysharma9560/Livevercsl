<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LiveCam - Remote Camera Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
        }

        /* Main Container */
        .stream-container {
            width: 100%;
            max-width: 500px;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Header */
        .stream-header {
            padding: 20px 24px;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.3));
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stream-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 28px;
            filter: drop-shadow(0 0 8px #00ff88);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #00ff88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 14px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .status-dot.offline {
            background: #ff4444;
            box-shadow: 0 0 8px #ff4444;
            animation: pulse 1.5s infinite;
        }

        .status-dot.online {
            background: #00ff88;
            box-shadow: 0 0 12px #00ff88;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .status-text {
            font-size: 13px;
            font-weight: 500;
            color: #fff;
        }

        /* Device Info */
        .device-info {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .device-detail {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #aaa;
        }

        .device-detail strong {
            color: #00ff88;
            font-weight: 600;
        }

        .badge {
            background: rgba(0, 255, 136, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: #00ff88;
            font-family: monospace;
        }

        /* Quality Bar */
        .quality-bar {
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .quality-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #aaa;
        }

        .quality-select {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quality-select:hover {
            border-color: #00ff88;
        }

        .stats {
            display: flex;
            gap: 16px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #888;
            font-family: monospace;
        }

        .stat-value {
            color: #00ff88;
        }

        /* Video Player */
        .video-section {
            padding: 20px 24px;
            background: #000;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .placeholder-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            gap: 16px;
            transition: all 0.3s ease;
        }

        .placeholder-overlay.hidden {
            display: none;
        }

        .placeholder-icon {
            font-size: 56px;
            opacity: 0.5;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .placeholder-text {
            font-size: 14px;
            color: #888;
        }

        .placeholder-sub {
            font-size: 11px;
            color: #555;
        }

        /* Controls */
        .controls-section {
            padding: 20px 24px;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.3));
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .control-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 120px;
            justify-content: center;
        }

        .control-btn:active {
            transform: scale(0.96);
        }

        .btn-play {
            background: linear-gradient(135deg, #00ff88, #00aa55);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        .btn-stop {
            background: linear-gradient(135deg, #ff4444, #aa0000);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 68, 68, 0.3);
        }

        .btn-reconnect {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Footer */
        .stream-footer {
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 10px;
            color: #555;
        }

        .recording-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .rec-dot {
            width: 8px;
            height: 8px;
            background: #ff4444;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        .timer {
            font-family: monospace;
            font-size: 11px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="stream-container">
        <!-- Header -->
        <div class="stream-header">
            <div class="stream-title">
                <div class="logo-section">
                    <div class="logo-icon">📹</div>
                    <div class="logo-text">LiveCam</div>
                </div>
                <div class="status-pill">
                    <div class="status-dot offline" id="statusDot"></div>
                    <span class="status-text" id="statusText">Disconnected</span>
                </div>
            </div>
            <div class="device-info">
                <div class="device-detail">
                    <span>📱</span>
                    <strong id="deviceName">—</strong>
                </div>
                <div class="device-detail">
                    <span>🆔</span>
                    <span id="deviceId" class="badge">No device</span>
                </div>
                <div class="device-detail">
                    <span>🔗</span>
                    <span id="roomId" class="badge">camera_room_123</span>
                </div>
            </div>
        </div>

        <!-- Quality Bar -->
        <div class="quality-bar">
            <div class="quality-label">
                <span>🎥</span>
                <select class="quality-select" id="qualitySelect">
                    <option value="160">144p</option>
                    <option value="320">240p</option>
                    <option value="480" selected>360p</option>
                    <option value="640">480p</option>
                    <option value="854">720p</option>
                </select>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span>📡</span>
                    <span id="connectionType" class="stat-value">—</span>
                </div>
                <div class="stat-item">
                    <span>⚡</span>
                    <span id="bitrate" class="stat-value">0</span>
                    <span>kbps</span>
                </div>
                <div class="stat-item">
                    <span>🎬</span>
                    <span id="resolution" class="stat-value">—</span>
                </div>
            </div>
        </div>

        <!-- Video Section -->
        <div class="video-section">
            <div class="video-wrapper">
                <video id="remoteVideo" autoplay playsinline muted></video>
                <div class="placeholder-overlay" id="placeholderOverlay">
                    <div class="placeholder-icon">📷</div>
                    <div class="placeholder-text">No Active Stream</div>
                    <div class="placeholder-sub">Connect your device and tap PLAY</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-section">
            <button class="control-btn btn-play" id="playBtn">
                <span>▶</span> PLAY
            </button>
            <button class="control-btn btn-stop" id="stopBtn">
                <span>⏹</span> STOP
            </button>
            <button class="control-btn btn-reconnect" id="reconnectBtn">
                <span>⟳</span> RECONNECT
            </button>
        </div>

        <!-- Footer -->
        <div class="stream-footer">
            <div class="recording-indicator">
                <div class="rec-dot" id="recDot"></div>
                <span id="recText">STANDBY</span>
            </div>
            <div class="timer" id="timer">00:00:00</div>
            <div>🔒 Secure WebRTC</div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script>
        const ROOM_ID = "camera_room_123";
        const SIGNAL_SERVER = "https://server-2-hwtd.onrender.com";
        
        // DOM Elements
        const remoteVideo = document.getElementById('remoteVideo');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const deviceNameSpan = document.getElementById('deviceName');
        const deviceIdSpan = document.getElementById('deviceId');
        const placeholderOverlay = document.getElementById('placeholderOverlay');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const reconnectBtn = document.getElementById('reconnectBtn');
        const qualitySelect = document.getElementById('qualitySelect');
        const connectionTypeSpan = document.getElementById('connectionType');
        const bitrateSpan = document.getElementById('bitrate');
        const resolutionSpan = document.getElementById('resolution');
        const recDot = document.getElementById('recDot');
        const recText = document.getElementById('recText');
        const timerSpan = document.getElementById('timer');
        
        // State variables
        let pc = null;
        let socket = null;
        let isStreaming = false;
        let startTime = null;
        let timerInterval = null;
        let phoneConnected = false;
        let streamActive = false;
        
        // WebRTC Configuration
        const configuration = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" },
                {
                    urls: "turn:openrelay.metered.ca:80",
                    username: "openrelayproject",
                    credential: "openrelayproject"
                },
                {
                    urls: "turn:openrelay.metered.ca:443",
                    username: "openrelayproject",
                    credential: "openrelayproject"
                }
            ]
        };
        
        function getResolutionFromSelect() {
            const val = parseInt(qualitySelect.value);
            switch(val) {
                case 160: return { width: 160, height: 120 };
                case 320: return { width: 320, height: 240 };
                case 480: return { width: 480, height: 360 };
                case 640: return { width: 640, height: 480 };
                case 854: return { width: 854, height: 480 };
                default: return { width: 480, height: 360 };
            }
        }
        
        function updateResolutionDisplay() {
            const res = getResolutionFromSelect();
            resolutionSpan.innerText = `${res.width}x${res.height}`;
        }
        
        function updateTimer() {
            if (!startTime) { timerSpan.innerText = "00:00:00"; return; }
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const hours = Math.floor(elapsed / 3600);
            const minutes = Math.floor((elapsed % 3600) / 60);
            const seconds = elapsed % 60;
            timerSpan.innerText = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            startTime = Date.now();
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }
        
        function stopTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            startTime = null;
            updateTimer();
        }
        
        function setConnected(deviceName = null, deviceId = null) {
            statusDot.className = 'status-dot online';
            statusText.innerText = 'Connected';
            if (deviceName) deviceNameSpan.innerText = deviceName;
            if (deviceId) deviceIdSpan.innerText = deviceId;
        }
        
        function setDisconnected() {
            statusDot.className = 'status-dot offline';
            statusText.innerText = 'Disconnected';
            deviceNameSpan.innerText = '—';
            deviceIdSpan.innerText = 'No device';
            connectionTypeSpan.innerText = '—';
            bitrateSpan.innerText = '0';
            phoneConnected = false;
            streamActive = false;
            if (remoteVideo.srcObject) { remoteVideo.srcObject = null; }
            placeholderOverlay.classList.remove('hidden');
            isStreaming = false;
            recDot.style.animation = 'none';
            recText.innerText = 'STANDBY';
            stopTimer();
        }
        
        function startStreamDisplay() {
            if (isStreaming) return;
            isStreaming = true;
            streamActive = true;
            placeholderOverlay.classList.add('hidden');
            connectionTypeSpan.innerText = 'WebRTC';
            recDot.style.animation = 'pulse 1s infinite';
            recText.innerText = 'LIVE';
            startTimer();
        }
        
        function stopStreamDisplay() {
            isStreaming = false;
            streamActive = false;
            placeholderOverlay.classList.remove('hidden');
            connectionTypeSpan.innerText = '—';
            recDot.style.animation = 'none';
            recText.innerText = 'STANDBY';
            stopTimer();
        }
        
        async function createPeerConnection() {
            if (pc) { pc.close(); }
            pc = new RTCPeerConnection(configuration);
            
            pc.ontrack = (event) => {
                if (event.track.kind === 'video') {
                    const stream = event.streams[0];
                    if (remoteVideo.srcObject !== stream) {
                        remoteVideo.srcObject = stream;
                        remoteVideo.play().catch(e => console.log("Play error:", e));
                    }
                    startStreamDisplay();
                }
            };
            
            pc.onicecandidate = (event) => {
                if (event.candidate && socket && socket.connected) {
                    socket.emit('signal', { room: ROOM_ID, from: 'web', signal: event.candidate });
                }
            };
            
            pc.oniceconnectionstatechange = () => {
                if (pc.iceConnectionState === 'connected') {
                    setConnected();
                } else if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                    stopStreamDisplay();
                }
            };
            return pc;
        }
        
        async function startWebRTC() {
            if (!phoneConnected) {
                alert("❌ No phone connected! Please open APK first.");
                return;
            }
            
            if (streamActive) {
                alert("Stream already active!");
                return;
            }
            
            if (!pc) await createPeerConnection();
            
            const offer = await pc.createOffer({
                offerToReceiveVideo: true,
                offerToReceiveAudio: false
            });
            await pc.setLocalDescription(offer);
            if (socket && socket.connected) {
                socket.emit('signal', { room: ROOM_ID, from: 'web', signal: offer });
            }
        }
        
        function stopWebRTC() {
            if (pc) { pc.close(); pc = null; }
            if (remoteVideo.srcObject) { remoteVideo.srcObject = null; }
            stopStreamDisplay();
            streamActive = false;
        }
        
        function initSocket() {
            if (socket) { socket.disconnect(); }
            socket = io(SIGNAL_SERVER, { transports: ['websocket'], reconnection: true });
            
            socket.on('connect', () => { 
                socket.emit('join-room', ROOM_ID, 'web');
            });
            
            socket.on('user-joined', (userId) => {
                phoneConnected = true;
                setConnected('OPPO CPH2061', userId.substring(0, 8));
            });
            
            socket.on('signal', async (data) => {
                if (!pc) await createPeerConnection();
                if (data.signal.type === 'answer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
                } else if (data.signal.candidate) {
                    await pc.addIceCandidate(new RTCIceCandidate(data.signal));
                }
            });
            
            socket.on('user-left', () => { 
                phoneConnected = false; 
                stopWebRTC(); 
                setDisconnected(); 
            });
            
            socket.on('disconnect', () => { 
                setDisconnected(); 
            });
        }
        
        // Event Listeners
        playBtn.addEventListener('click', () => { startWebRTC(); });
        stopBtn.addEventListener('click', () => { stopWebRTC(); });
        reconnectBtn.addEventListener('click', () => {
            setDisconnected();
            if (pc) { pc.close(); pc = null; }
            if (socket) { socket.disconnect(); }
            initSocket();
        });
        
        qualitySelect.addEventListener('change', () => {
            updateResolutionDisplay();
            if (streamActive) {
                stopWebRTC();
                setTimeout(() => startWebRTC(), 500);
            }
        });
        
        // Simulate bitrate
        setInterval(() => {
            if (isStreaming) {
                const randomBitrate = Math.floor(Math.random() * 300) + 200;
                bitrateSpan.innerText = randomBitrate;
            } else {
                bitrateSpan.innerText = '0';
            }
        }, 2000);
        
        // Initialize
        updateResolutionDisplay();
        setDisconnected();
        initSocket();
        
        console.log("✅ LiveCam Ready — PLAY button se live stream start hoga!");
    </script>
</body>
</html>
