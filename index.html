<!DOCTYPE html>
<html>
<head>
    <title>Live Stream</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <h1>Live CCTV Stream</h1>
    <img id="stream" width="100%" style="max-width:800px; border:2px solid green;">
    
    <p>Status: <span id="status">Connecting...</span></p>
    
    <script>
        const img = document.getElementById('stream');
        const statusSpan = document.getElementById('status');
        
        // Direct MJPEG stream
        img.src = 'https://server-3-phat.onrender.com/stream';
        
        img.onload = () => {
            statusSpan.innerHTML = '🟢 LIVE';
            statusSpan.style.color = 'green';
        };
        
        img.onerror = () => {
            statusSpan.innerHTML = '🔴 OFFLINE - Start phone app';
            statusSpan.style.color = 'red';
        };
        
        // Refresh timestamp every second
        setInterval(() => {
            if (img.complete && img.naturalWidth > 0) {
                statusSpan.innerHTML = '🟢 LIVE - ' + new Date().toLocaleTimeString();
            }
        }, 1000);
    </script>
</body>
</html>
