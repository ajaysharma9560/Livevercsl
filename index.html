<!DOCTYPE html>
<html>
<head>
  <title>Live Camera Status</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: #1c1c1c;
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .status {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .online { color: #00ff6a; }
    .offline { color: #ff3b3b; }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
    }

    .green { background: #00ff6a; }
    .red { background: #ff3b3b; }

    .ip {
      margin-top: 10px;
      font-size: 16px;
      color: #bbb;
    }
  </style>
</head>

<body>

<div class="card">
  <div id="statusText" class="status offline">
    <span class="dot red"></span> OFFLINE
  </div>

  <div class="ip" id="ipText">
    IP: Not Connected
  </div>
</div>

<script>
  const socket = io("https://server-2-hwtd.onrender.com", {
    transports: ["websocket"]
  });

  const statusText = document.getElementById("statusText");
  const ipText = document.getElementById("ipText");

  socket.on("connect", () => {
    statusText.innerHTML = '<span class="dot green"></span> ONLINE';
    statusText.className = "status online";
  });

  socket.on("disconnect", () => {
    statusText.innerHTML = '<span class="dot red"></span> OFFLINE';
    statusText.className = "status offline";
    ipText.innerText = "IP: Not Connected";
  });

  socket.on("client-info", (data) => {
    ipText.innerText = "IP: " + data.ip;
  });
</script>

</body>
</html>
