<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ludo Cam - Live Videos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #0f0f0f;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid #222;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .header {
            padding: 20px;
            background: #141414;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
        }

        .logo span {
            color: #00ff88;
        }

        .video-section {
            padding: 20px;
            background: #000;
        }

        .section-title {
            color: #888;
            font-size: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-btn {
            background: #1a1a1a;
            border: none;
            color: #00ff88;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
        }

        .refresh-btn:active {
            transform: scale(0.95);
        }

        .video-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .video-card {
            background: #0a0a0a;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .video-wrapper {
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
            cursor: pointer;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.6);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .play-overlay.hidden {
            display: none;
        }

        .play-btn {
            width: 55px;
            height: 55px;
            background: #00ff88;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0,255,136,0.5);
            transition: transform 0.2s;
        }

        .play-btn:active {
            transform: scale(0.9);
        }

        .play-btn span {
            font-size: 28px;
            color: #000;
            margin-left: 4px;
        }

        .video-info {
            padding: 10px;
            color: #666;
            font-size: 11px;
            text-align: center;
            border-top: 1px solid #222;
        }

        .footer {
            padding: 12px;
            text-align: center;
            font-size: 10px;
            color: #444;
            border-top: 1px solid #222;
        }

        .loading, .no-videos {
            text-align: center;
            color: #888;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📹 <span>LUDO</span> CAM</div>
        </div>

        <div class="video-section">
            <div class="section-title">
                <span>📹 LIVE STREAMS</span>
                <button class="refresh-btn" onclick="fetchVideos()">⟳ REFRESH</button>
            </div>
            <div class="video-list" id="videoList">
                <div class="loading">Loading videos...</div>
            </div>
        </div>

        <div class="footer">
            🔒 Tap ▶ PLAY button to watch video • Auto-refresh every 10 sec
        </div>
    </div>

    <script>
        // ========== CLOUDINARY CONFIGURATION ==========
        const CLOUD_NAME = "dypwj2dhh";
        const FOLDER = "live_cams";
        
        let videoElements = [];

        // ========== PLAY BUTTON SETUP ==========
        function setupVideoCard(videoElement, overlayElement) {
            // Jab user PLAY button click karega
            overlayElement.addEventListener('click', () => {
                // Pehle sab videos pause karo
                videoElements.forEach(v => {
                    if (v !== videoElement && !v.paused) {
                        v.pause();
                        const parentCard = v.closest('.video-card');
                        const otherOverlay = parentCard?.querySelector('.play-overlay');
                        if (otherOverlay) otherOverlay.classList.remove('hidden');
                    }
                });
                
                // Current video play karo
                videoElement.play();
                // Play button hide karo
                overlayElement.classList.add('hidden');
            });
            
            // Video end hone par play button wapas dikhao
            videoElement.addEventListener('ended', () => {
                overlayElement.classList.remove('hidden');
            });
            
            // Pause hone par play button wapas dikhao
            videoElement.addEventListener('pause', () => {
                if (videoElement.currentTime === videoElement.duration) return;
                overlayElement.classList.remove('hidden');
            });
        }

        // ========== FETCH VIDEOS FROM CLOUDINARY ==========
        async function fetchVideos() {
            try {
                const url = `https://res.cloudinary.com/${CLOUD_NAME}/video/list/${FOLDER}.json`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.resources && data.resources.length > 0) {
                    const videos = [...data.resources].reverse();
                    
                    document.getElementById('videoList').innerHTML = videos.map((video, index) => `
                        <div class="video-card">
                            <div class="video-wrapper">
                                <video id="video-${index}" preload="metadata" muted playsinline>
                                    <source src="${video.secure_url}" type="video/mp4">
                                </video>
                                <div class="play-overlay" id="overlay-${index}">
                                    <div class="play-btn">
                                        <span>▶</span>
                                    </div>
                                </div>
                            </div>
                            <div class="video-info">
                                📅 ${new Date(video.created_at).toLocaleString()}
                            </div>
                        </div>
                    `).join('');
                    
                    videoElements = [];
                    for (let i = 0; i < videos.length; i++) {
                        const video = document.getElementById(`video-${i}`);
                        const overlay = document.getElementById(`overlay-${i}`);
                        if (video && overlay) {
                            videoElements.push(video);
                            setupVideoCard(video, overlay);
                        }
                    }
                } else {
                    document.getElementById('videoList').innerHTML = '<div class="no-videos">📭 No videos yet. Waiting for stream...</div>';
                }
            } catch (error) {
                document.getElementById('videoList').innerHTML = '<div class="no-videos">⚠️ Error loading videos</div>';
            }
        }

        fetchVideos();
        setInterval(fetchVideos, 10000);
    </script>
</body>
</html>
