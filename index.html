<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Control Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📹 CCTV Camera Control</h1>
        
        <!-- Device ID Input -->
        <div class="device-section">
            <label>Device ID (Phone Android ID)</label>
            <input type="text" id="deviceId" placeholder="Enter your device ID" />
            <button onclick="saveDeviceId()" class="save-btn">Save Device</button>
        </div>
        
        <!-- Status Card -->
        <div class="status-card">
            <div class="status-header">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Offline</span>
            </div>
            <div class="status-info">
                <p>📱 Device: <span id="deviceIdDisplay">Not set</span></p>
                <p>🎥 Resolution: <span id="resolutionDisplay">-</span></p>
                <p>🔗 Stream URL: <span id="streamUrlDisplay">-</span></p>
                <p>⏱ Last Seen: <span id="lastSeen">-</span></p>
            </div>
        </div>
        
        <!-- Control Buttons -->
        <div class="controls">
            <button id="startBtn" class="btn start-btn" onclick="sendCommand('start')">
                ▶ START STREAM
            </button>
            <button id="stopBtn" class="btn stop-btn" onclick="sendCommand('stop')">
                ⏹ STOP STREAM
            </button>
        </div>
        
        <!-- Resolution Controls -->
        <div class="resolution-section">
            <h3>Resolution Settings</h3>
            <button class="res-btn" onclick="sendCommand('resolution_120p')">120p (160x120)</button>
            <button class="res-btn" onclick="sendCommand('resolution_240p')">240p (320x240)</button>
        </div>
        
        <!-- Live Preview -->
        <div class="preview-section">
            <h3>Live Preview</h3>
            <img id="liveFrame" width="640" height="480" />
            <p id="streamStatus">⚫ Stream not active</p>
        </div>
        
        <!-- Command Log -->
        <div class="log-section">
            <h3>Command Log</h3>
            <div id="logContainer"></div>
        </div>
    </div>
    
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
