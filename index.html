<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LUDO CAM - LIVE CONTROL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: #121212;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .header {
            background: #1a1a1a;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #2a2a2a;
        }

        .header h1 {
            color: #fff;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .header h1 span {
            color: #00ff88;
        }

        .live-badge {
            display: inline-block;
            background: #ff0000;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 30px;
            margin-top: 8px;
            animation: blink 1.2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; background: #ff0000; }
            50% { opacity: 0.6; background: #cc0000; }
        }

        .status-card {
            background: #1a1a1a;
            margin: 16px;
            padding: 20px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid #2a2a2a;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .status-dot.online {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .status-dot.offline {
            background: #ff4444;
        }

        .status-text {
            color: #fff;
            font-size: 14px;
            font-weight: 500;
        }

        .device-name {
            color: #888;
            font-size: 12px;
            margin-top: 8px;
            font-family: monospace;
        }

        .recording-status {
            margin-top: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            font-size: 11px;
        }

        .recording-status.active {
            background: #00ff8822;
            color: #00ff88;
        }

        .recording-status.inactive {
            background: #ff444422;
            color: #ff6666;
        }

        .button-group {
            display: flex;
            gap: 16px;
            margin: 16px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: monospace;
        }

        .btn-start {
            background: #00ff88;
            color: #000;
        }

        .btn-start:hover {
            background: #00cc6e;
            transform: scale(1.02);
        }

        .btn-stop {
            background: #ff4444;
            color: #fff;
        }

        .btn-stop:hover {
            background: #cc0000;
            transform: scale(1.02);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .quality-section {
            background: #1a1a1a;
            margin: 16px;
            padding: 16px;
            border-radius: 24px;
            border: 1px solid #2a2a2a;
        }

        .quality-label {
            color: #fff;
            font-size: 14px;
            margin-bottom: 12px;
            display: block;
        }

        .quality-select {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #fff;
            padding: 12px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
        }

        .quality-select:focus {
            outline: none;
            border-color: #00ff88;
        }

        .video-section {
            background: #000;
            margin: 16px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
        }

        .video-wrapper {
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            font-family: monospace;
        }

        .loader {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 12px;
        }

        .footer {
            text-align: center;
            padding: 16px;
            color: #444;
            font-size: 10px;
            border-top: 1px solid #2a2a2a;
        }

        .hidden {
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📸 <span>LUDO</span> CAM</h1>
        <div class="live-badge">🔴 LIVE</div>
    </div>

    <div class="status-card">
        <div>
            <span class="status-dot" id="statusDot"></span>
            <span class="status-text" id="statusText">Searching for device...</span>
        </div>
        <div class="device-name" id="deviceName">—</div>
        <div id="recordingStatusBadge" class="recording-status inactive">⏹ STOPPED</div>
    </div>

    <div class="button-group">
        <button class="btn btn-start" id="startBtn" disabled>▶ START LIVE</button>
        <button class="btn btn-stop" id="stopBtn" disabled>⏹ STOP LIVE</button>
    </div>

    <div class="quality-section">
        <label class="quality-label">🎥 STREAM QUALITY</label>
        <select class="quality-select" id="qualitySelect" disabled onchange="sendQualityCommand()">
            <option value="120p">120p (Low - 160x120)</option>
            <option value="240p" selected>240p (Default - 320x240)</option>
        </select>
    </div>

    <div class="video-section">
        <div class="video-wrapper">
            <video id="liveVideo" autoplay muted playsinline disablePictureInPicture></video>
            <div class="video-label">📡 LIVE STREAM</div>
        </div>
    </div>

    <div class="footer">
        🔒 Secure Live Stream • Control from anywhere
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    // ============================================================
    // FIREBASE CONFIGURATION (From google-services.json)
    // ============================================================
    const firebaseConfig = {
        apiKey: "AIzaSyBwDAhUS8iqNsM5rMewtwFnQs-s3FcnaoU",
        authDomain: "livecam-4e8b0.firebaseapp.com",
        databaseURL: "https://livecam-4e8b0-default-rtdb.firebaseio.com",
        projectId: "livecam-4e8b0",
        storageBucket: "livecam-4e8b0.firebasestorage.app",
        appId: "1:315485454659:android:e5d69c3b9a1a87854c2ff6"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const dbRef = database.ref('ludo_cam');

    // ============================================================
    // GLOBAL VARIABLES
    // ============================================================
    let currentDeviceId = null;
    let isRecordingActive = false;
    let videoQueue = [];
    let currentVideoUrl = null;
    let isPlaying = false;

    // DOM Elements
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const deviceNameSpan = document.getElementById('deviceName');
    const recordingStatusBadge = document.getElementById('recordingStatusBadge');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const qualitySelect = document.getElementById('qualitySelect');
    const liveVideo = document.getElementById('liveVideo');

    // ============================================================
    // TOAST NOTIFICATION
    // ============================================================
    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.style.backgroundColor = isError ? '#cc0000' : '#333';
        toast.innerText = message;
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.backgroundColor = '#333';
        }, 3000);
    }

    // ============================================================
    // FIND ACTIVE DEVICE FROM FIREBASE (AUTOMATIC!)
    // ============================================================
    async function findActiveDevice() {
        statusText.innerText = 'Searching for device...';
        
        try {
            const snapshot = await dbRef.child('devices').once('value');
            const devices = snapshot.val();
            
            if (!devices) {
                statusText.innerText = 'No device found';
                statusDot.className = 'status-dot offline';
                deviceNameSpan.innerText = 'No Android device connected';
                showToast('❌ No Android device found! Please install and open the app.', true);
                return null;
            }
            
            // Find first online device
            for (const [deviceId, device] of Object.entries(devices)) {
                if (device.online === true) {
                    currentDeviceId = deviceId;
                    statusDot.className = 'status-dot online';
                    statusText.innerText = '🟢 ONLINE';
                    deviceNameSpan.innerText = `📱 ${device.deviceName || 'Camera'}`;
                    
                    // Update recording status
                    isRecordingActive = device.recording === true;
                    updateRecordingUI();
                    
                    // Enable controls
                    startBtn.disabled = false;
                    stopBtn.disabled = false;
                    qualitySelect.disabled = false;
                    
                    showToast(`✅ Connected to ${device.deviceName || 'Camera'}`);
                    
                    // Listen for real-time updates
                    listenToDeviceStatus(deviceId);
                    
                    return deviceId;
                }
            }
            
            // No online device found
            statusText.innerText = 'Device offline';
            statusDot.className = 'status-dot offline';
            deviceNameSpan.innerText = 'App is closed or offline';
            showToast('❌ Device is offline! Please open the Android app.', true);
            return null;
            
        } catch (error) {
            console.error('Error finding device:', error);
            statusText.innerText = 'Error connecting';
            showToast('❌ Firebase connection error!', true);
            return null;
        }
    }

    // ============================================================
    // LISTEN TO DEVICE STATUS REAL-TIME
    // ============================================================
    function listenToDeviceStatus(deviceId) {
        dbRef.child(`devices/${deviceId}`).on('value', (snapshot) => {
            const device = snapshot.val();
            if (device) {
                isRecordingActive = device.recording === true;
                updateRecordingUI();
                
                if (device.online !== true) {
                    statusDot.className = 'status-dot offline';
                    statusText.innerText = 'Device offline';
                    startBtn.disabled = true;
                    stopBtn.disabled = true;
                    qualitySelect.disabled = true;
                } else {
                    statusDot.className = 'status-dot online';
                    statusText.innerText = '🟢 ONLINE';
                    startBtn.disabled = false;
                    stopBtn.disabled = false;
                    qualitySelect.disabled = false;
                }
            }
        });
    }

    // ============================================================
    // UPDATE RECORDING UI
    // ============================================================
    function updateRecordingUI() {
        if (isRecordingActive) {
            recordingStatusBadge.innerText = '🔴 RECORDING';
            recordingStatusBadge.className = 'recording-status active';
        } else {
            recordingStatusBadge.innerText = '⏹ STOPPED';
            recordingStatusBadge.className = 'recording-status inactive';
        }
    }

    // ============================================================
    // SEND START COMMAND
    // ============================================================
    window.sendStartCommand = async function() {
        if (!currentDeviceId) {
            showToast('❌ No device connected!', true);
            return;
        }
        
        startBtn.disabled = true;
        startBtn.style.opacity = '0.6';
        
        try {
            await dbRef.child(`commands/${currentDeviceId}/control`).set('START');
            showToast('✅ Start command sent! Recording will begin...');
        } catch (error) {
            showToast('❌ Failed to send command: ' + error.message, true);
        }
        
        setTimeout(() => {
            startBtn.disabled = false;
            startBtn.style.opacity = '1';
        }, 2000);
    };

    // ============================================================
    // SEND STOP COMMAND
    // ============================================================
    window.sendStopCommand = async function() {
        if (!currentDeviceId) {
            showToast('❌ No device connected!', true);
            return;
        }
        
        stopBtn.disabled = true;
        stopBtn.style.opacity = '0.6';
        
        try {
            await dbRef.child(`commands/${currentDeviceId}/control`).set('STOP');
            showToast('⏹ Stop command sent! Recording will stop.');
        } catch (error) {
            showToast('❌ Failed to send command: ' + error.message, true);
        }
        
        setTimeout(() => {
            stopBtn.disabled = false;
            stopBtn.style.opacity = '1';
        }, 2000);
    };

    // ============================================================
    // SEND QUALITY COMMAND
    // ============================================================
    window.sendQualityCommand = async function() {
        if (!currentDeviceId) return;
        
        const quality = qualitySelect.value;
        
        try {
            await dbRef.child(`commands/${currentDeviceId}/quality`).set(quality);
            showToast(`🎥 Quality changed to ${quality}`);
        } catch (error) {
            console.error('Quality error:', error);
        }
    };

    // ============================================================
    // FETCH LATEST VIDEOS FROM API
    // ============================================================
    async function fetchLatestVideos() {
        try {
            const response = await fetch('/api/photos');
            const data = await response.json();
            
            if (data.success && data.videos && data.videos.length > 0) {
                for (const video of data.videos) {
                    if (video.url !== currentVideoUrl) {
                        currentVideoUrl = video.url;
                        videoQueue.push(video.url);
                    }
                }
                
                if (videoQueue.length > 3) {
                    videoQueue = videoQueue.slice(-3);
                }
                
                if (!isPlaying && videoQueue.length > 0) {
                    playNextVideo();
                }
            }
        } catch (error) {
            console.error('Fetch error:', error);
        }
    }

    // ============================================================
    // PLAY NEXT VIDEO (Seamless)
    // ============================================================
    function playNextVideo() {
        if (videoQueue.length === 0) return;
        
        const nextUrl = videoQueue.shift();
        
        liveVideo.style.transition = 'opacity 0.3s ease';
        liveVideo.style.opacity = '0';
        
        setTimeout(() => {
            liveVideo.src = nextUrl;
            liveVideo.load();
            liveVideo.play().catch(e => console.log('Autoplay blocked:', e));
            liveVideo.style.opacity = '1';
            isPlaying = true;
            
            setTimeout(() => {
                liveVideo.style.transition = '';
            }, 300);
        }, 100);
    }

    liveVideo.addEventListener('ended', () => {
        isPlaying = false;
        if (videoQueue.length > 0) {
            playNextVideo();
        } else {
            setTimeout(fetchLatestVideos, 1000);
        }
    });

    // ============================================================
    // INITIALIZATION
    // ============================================================
    async function init() {
        await findActiveDevice();
        fetchLatestVideos();
        
        // Poll for device status every 5 seconds (fallback)
        setInterval(async () => {
            if (!currentDeviceId) {
                await findActiveDevice();
            }
        }, 5000);
        
        // Poll for videos every 3 seconds
        setInterval(fetchLatestVideos, 3000);
    }
    
    // Start the app
    init();
    
    // Attach button events
    document.getElementById('startBtn').onclick = sendStartCommand;
    document.getElementById('stopBtn').onclick = sendStopCommand;
    document.getElementById('qualitySelect').onchange = sendQualityCommand;
</script>
</body>
</html>
