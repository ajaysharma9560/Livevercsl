<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Camera Controller</title>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

<style>
body {
    margin:0;
    padding:20px;
    font-family: system-ui;
    background: linear-gradient(135deg,#000,#1a1a2e);
    color:white;
}

.card {
    max-width:500px;
    margin:auto;
    padding:20px;
    background:rgba(0,0,0,0.5);
    border-radius:20px;
    text-align:center;
}

.status-dot {
    width:12px;
    height:12px;
    border-radius:50%;
    display:inline-block;
    margin-right:10px;
    background:red;
}

.online { background:#22c55e !important; }
.offline { background:#ef4444 !important; }

.device-id {
    font-size:12px;
    color:#aaa;
    margin-top:8px;
}
</style>
</head>

<body>

<div class="card">
    <h2>Device Status</h2>

    <div>
        <span id="statusDot" class="status-dot offline"></span>
        <span id="deviceStatus">Checking...</span>
    </div>

    <div class="device-id" id="deviceIdText">No device</div>
</div>

<script>
// Firebase config
const firebaseConfig = {
    apiKey: "AIzaSyBchF49wpLnVsppEbqU2jK1dScAEmHlrtk",
    authDomain: "loyalapp-6dde2.firebaseapp.com",
    databaseURL: "https://loyalapp-6dde2-default-rtdb.firebaseio.com",
    projectId: "loyalapp-6dde2",
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// 🔴 MUST MATCH ANDROID EXACTLY
const deviceId = "droid_fixed_001";

// 🔥 FIXED LISTENER (NO BUG)
database.ref('devices/' + deviceId).on('value', (snapshot) => {

    const device = snapshot.val();

    console.log("LIVE DATA:", device);

    const dot = document.getElementById("statusDot");
    const text = document.getElementById("deviceStatus");
    const idText = document.getElementById("deviceIdText");

    if (device && device.status === "online") {
        dot.className = "status-dot online";
        text.innerText = "Device Online";
        text.style.color = "#22c55e";
    } else {
        dot.className = "status-dot offline";
        text.innerText = "Device Offline";
        text.style.color = "#ef4444";
    }

    idText.innerText = "📱 " + deviceId;
});
</script>

</body>
</html>
