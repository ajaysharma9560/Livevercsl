<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Login - Ludo Cam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 350px;
            background: #0f0f0f;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid #222;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            padding: 40px 24px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 32px;
            color: #fff;
        }

        .logo span {
            color: #00ff88;
        }

        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00ff88;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .error {
            color: #ff4444;
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            color: #555;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>📸 <span>LUDO</span> CAM</h1>
            <p>Enter password to continue</p>
        </div>

        <div class="input-group">
            <input type="password" id="passwordInput" placeholder="Enter password" autofocus>
        </div>

        <button class="login-btn" onclick="checkPassword()">🔓 UNLOCK</button>

        <div id="errorMsg" class="error"></div>
        <div class="footer">🔒 Private Access Only</div>
    </div>

    <script>
        // 🔥 PASSWORD SET KARO 🔥
        const CORRECT_PASSWORD = "hackerbabu";
        
        function checkPassword() {
            const password = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (password === CORRECT_PASSWORD) {
                // Password sahi hai → photo page pe bhejo
                window.location.href = "index.html";
            } else {
                errorMsg.innerText = "❌ Invalid password! Try again.";
                document.getElementById('passwordInput').value = "";
                document.getElementById('passwordInput').focus();
            }
        }
        
        // Enter key press karne par bhi kaam kare
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
</body>
</html>
