<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Camera Stream</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }
        
        /* Header with status */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: transparent;
            color: white;
            font-size: 14px;
        }
        
        .time {
            font-weight: 500;
        }
        
        .battery {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* Main Container */
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        /* Video Preview Area */
        .video-container {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        #streamImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Top Overlay Controls */
        .top-controls {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
        }
        
        .quality-badge {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            font-weight: 500;
        }
        
        .back-btn {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        
        /* Bottom Controls */
        .bottom-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            z-index: 10;
        }
        
        .control-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            width: 70px;
            height: 70px;
            border-radius: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .control-btn:active {
            transform: scale(0.95);
        }
        
        .control-btn.record {
            background: #22c55e;
            border: none;
            box-shadow: 0 0 20px rgba(34,197,94,0.5);
        }
        
        .control-btn.stop {
            background: #ef4444;
            border: none;
        }
        
        .control-btn.flip {
            background: rgba(0,0,0,0.6);
        }
        
        /* Status Text */
        .status-text {
            position: absolute;
            bottom: 120px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 6px;
            backdrop-filter: blur(5px);
        }
        
        /* Quality Panel */
        .quality-panel {
            position: absolute;
            bottom: 130px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 8px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        
        .quality-option {
            padding: 6px 14px;
            border-radius: 25px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
        }
        
        .quality-option.active {
            background: #22c55e;
        }
        
        /* FPS Counter */
        .fps-counter {
            position: absolute;
            top: 60px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 20px;
            color: #22c55e;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Video Area -->
        <div class="video-container">
            <img id="streamImage" src="">
            
            <!-- Top Controls -->
            <div class="top-controls">
                <div class="back-btn" onclick="history.back()">←</div>
                <div class="quality-badge" id="qualityBadge">240p</div>
            </div>
            
            <!-- FPS Counter -->
            <div class="fps-counter" id="fpsCounter">0 FPS</div>
            
            <!-- Quality Panel -->
            <div class="quality-panel" id="qualityPanel">
                <div class="quality-option" data-quality="140p">140p</div>
                <div class="quality-option active" data-quality="240p">240p</div>
                <div class="quality-option" data-quality="360p">360p</div>
            </div>
            
            <!-- Status Text -->
            <div class="status-text" id="statusText">● Ready</div>
            
            <!-- Bottom Controls -->
            <div class="bottom-controls">
                <div class="control-btn flip" id="flipBtn">🔄</div>
                <div class="control-btn record" id="startBtn">▶</div>
                <div class="control-btn stop" id="stopBtn">⏹</div>
            </div>
        </div>
    </div>
    
    <script>
        // 🔴🔴🔴 REPLIT SERVER URL 🔴🔴🔴
        const SERVER_URL = "https://afd72d85-3130-4283-a166-eff5f9d20ecc-00-38ph50wurdt2w.pike.replit.dev";
        
        const socket = io(SERVER_URL, {
            transports: ['websocket', 'polling'],
            reconnection: true
        });
        
        // Elements
        const streamImage = document.getElementById('streamImage');
        const fpsCounter = document.getElementById('fpsCounter');
        const statusText = document.getElementById('statusText');
        const qualityBadge = document.getElementById('qualityBadge');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const flipBtn = document.getElementById('flipBtn');
        
        let fps = 0;
        let lastFpsUpdate = Date.now();
        
        // FPS Counter
        function updateFPS() {
            const now = Date.now();
            if (now - lastFpsUpdate >= 1000) {
                fpsCounter.innerText = fps + ' FPS';
                fps = 0;
                lastFpsUpdate = now;
            }
            requestAnimationFrame(updateFPS);
        }
        updateFPS();
        
        // Quality Selection
        document.querySelectorAll('.quality-option').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.quality-option').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const quality = btn.dataset.quality;
                qualityBadge.innerText = quality;
                socket.emit('set-quality', quality);
                statusText.innerText = '● Quality: ' + quality;
                setTimeout(() => {
                    if (statusText.innerText.includes('Quality')) {
                        statusText.innerText = '● Ready';
                    }
                }, 1500);
            };
        });
        
        // Control Buttons
        startBtn.onclick = () => {
            socket.emit('command', 'start');
            statusText.innerText = '● Starting...';
            startBtn.style.opacity = '0.7';
            setTimeout(() => {
                startBtn.style.opacity = '1';
            }, 500);
        };
        
        stopBtn.onclick = () => {
            socket.emit('command', 'stop');
            statusText.innerText = '● Stopped';
            stopBtn.style.opacity = '0.7';
            setTimeout(() => {
                stopBtn.style.opacity = '1';
            }, 500);
        };
        
        flipBtn.onclick = () => {
            socket.emit('flip-camera');
            statusText.innerText = '● Flipping camera...';
            setTimeout(() => {
                if (statusText.innerText.includes('Flipping')) {
                    statusText.innerText = '● Ready';
                }
            }, 1500);
        };
        
        // Socket Events
        socket.on('connect', () => {
            console.log('Connected');
            statusText.innerText = '● Connected';
            setTimeout(() => {
                if (statusText.innerText === '● Connected') {
                    statusText.innerText = '● Ready';
                }
            }, 2000);
        });
        
        socket.on('disconnect', () => {
            statusText.innerText = '● Disconnected';
            statusText.style.color = '#ef4444';
        });
        
        socket.on('frame', (data) => {
            if (data) {
                streamImage.src = data;
                fps++;
                statusText.innerText = '● Live';
                statusText.style.color = '#22c55e';
                setTimeout(() => {
                    if (statusText.innerText === '● Live') {
                        statusText.innerText = '● Ready';
                        statusText.style.color = 'white';
                    }
                }, 1000);
            }
        });
        
        socket.on('deviceStatus', (data) => {
            if (data && data.status === 'online') {
                statusText.innerText = '● Device Online';
            }
        });
    </script>
</body>
</html>
