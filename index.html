<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Camera Controller</title>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>
/* ===== SAME YOUR UI ===== */
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: linear-gradient(135deg, #000000, #1a1a2e);
    font-family: system-ui;
    min-height:100vh;
    padding:20px;
}

.container { max-width:500px; margin:auto; }

.status-card {
    background: rgba(0,0,0,0.5);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    margin-bottom: 20px;
}

.status-dot {
    width:12px;
    height:12px;
    border-radius:50%;
    display:inline-block;
    margin-right:10px;
    background:red;
}

.online { background:#22c55e !important; }
.offline { background:#ef4444 !important; }

.device-id {
    color:#888;
    font-size:11px;
}
</style>
</head>

<body>

<div class="container">

    <div class="status-card">
        <div>
            <span id="statusDot" class="status-dot offline"></span>
            <span id="deviceStatus">Device Offline</span>
        </div>
        <div class="device-id" id="deviceId">No device</div>
    </div>

</div>

<script>
// 🔴 FIREBASE INIT
const firebaseConfig = {
    apiKey: "AIzaSyBchF49wpLnVsppEbqU2jK1dScAEmHlrtk",
    authDomain: "loyalapp-6dde2.firebaseapp.com",
    databaseURL: "https://loyalapp-6dde2-default-rtdb.firebaseio.com",
    projectId: "loyalapp-6dde2",
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// 🔴 MUST MATCH ANDROID EXACTLY
const deviceId = "droid_fixed_001";

// 🔥 FIXED LISTENER (NO Object.values BUG)
database.ref('devices/' + deviceId).on('value', (snapshot) => {

    const device = snapshot.val();
    console.log("DEVICE DATA:", device);

    const dot = document.getElementById("statusDot");
    const text = document.getElementById("deviceStatus");
    const idText = document.getElementById("deviceId");

    if (device && device.status === "online") {
        dot.className = "status-dot online";
        text.innerText = "Device Online";
        text.style.color = "#22c55e";
    } else {
        dot.className = "status-dot offline";
        text.innerText = "Device Offline";
        text.style.color = "#ef4444";
    }

    idText.innerText = "📱 " + deviceId;
});
</script>

</body>
</html>
