<!DOCTYPE html>
<html>
<head>
    <title>Connection Test</title>
    <style>
        body { background: black; color: white; text-align: center; padding: 50px; }
        .dot { width: 20px; height: 20px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        .red { background: red; box-shadow: 0 0 10px red; }
        .green { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
    </style>
</head>
<body>
    <h1>📱 Connection Status</h1>
    <div>
        <span class="dot red" id="statusDot"></span>
        <span id="statusText">Disconnected</span>
    </div>
    <p id="detail">Waiting for phone...</p>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script>
        const ROOM_ID = "camera_room_123";
        const SIGNAL_SERVER = "https://server-2-hwtd.onrender.com";
        
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const detail = document.getElementById('detail');
        
        const socket = io(SIGNAL_SERVER);
        
        socket.on('connect', () => {
            detail.innerText = 'Socket connected, joining room...';
            socket.emit('join-room', ROOM_ID, 'web');
        });
        
        socket.on('user-joined', (userId) => {
            statusDot.className = 'dot green';
            statusText.innerText = 'Connected ✅';
            detail.innerText = `Phone connected! (${userId})`;
        });
        
        socket.on('user-left', () => {
            statusDot.className = 'dot red';
            statusText.innerText = 'Disconnected';
            detail.innerText = 'Phone disconnected';
        });
        
        socket.on('disconnect', () => {
            statusDot.className = 'dot red';
            statusText.innerText = 'Disconnected';
            detail.innerText = 'Server connection lost';
        });
    </script>
</body>
</html>
