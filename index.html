<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Connection Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: #111;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid #222;
            padding: 32px;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 32px;
        }

        .status-box {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .dot {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto 16px auto;
            transition: all 0.3s ease;
        }

        .dot.red {
            background-color: #ff4444;
            box-shadow: 0 0 20px #ff4444;
        }

        .dot.green {
            background-color: #00ff88;
            box-shadow: 0 0 20px #00ff88;
        }

        .status-text {
            font-size: 18px;
            font-weight: 500;
            color: #fff;
        }

        .peer-id-box {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .peer-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }

        .peer-value {
            font-size: 14px;
            font-family: monospace;
            color: #00ff88;
            word-break: break-all;
            background: #0a0a0a;
            padding: 8px;
            border-radius: 8px;
        }

        .copy-btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
        }

        .copy-btn:active {
            transform: scale(0.96);
        }

        .footer {
            font-size: 11px;
            color: #555;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📹</div>
        <div class="title">Connection Test</div>

        <div class="status-box">
            <div class="dot red" id="statusDot"></div>
            <div class="status-text" id="statusText">Disconnected</div>
        </div>

        <div class="peer-id-box">
            <div class="peer-label">🔑 YOUR PEER ID (Share with APK)</div>
            <div class="peer-value" id="peerIdValue">Loading...</div>
            <button class="copy-btn" id="copyBtn">📋 Copy Peer ID</button>
        </div>

        <div class="footer">
            APK me Peer ID paste karo → Connect → Green dot aayega
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const peerIdSpan = document.getElementById('peerIdValue');
        const copyBtn = document.getElementById('copyBtn');

        let peer = null;
        let currentPeerId = null;
        let isConnected = false;

        function setConnected() {
            statusDot.className = 'dot green';
            statusText.innerText = 'Connected ✅';
            isConnected = true;
        }

        function setDisconnected() {
            statusDot.className = 'dot red';
            statusText.innerText = 'Disconnected';
            isConnected = false;
        }

        function copyPeerId() {
            if (currentPeerId) {
                navigator.clipboard.writeText(currentPeerId);
                alert('✅ Peer ID copied: ' + currentPeerId);
            }
        }

        // Initialize PeerJS
        function initializePeer() {
            const randomId = 'test_' + Math.random().toString(36).substring(2, 15);
            
            peer = new Peer(randomId, {
                host: '0.peerjs.com',
                port: 443,
                path: '/',
                secure: true
            });

            peer.on('open', (id) => {
                console.log('PeerJS connected! ID:', id);
                currentPeerId = id;
                peerIdSpan.innerText = id;
                setDisconnected();
            });

            // Jab koi call aaye (APK connect ho)
            peer.on('call', (call) => {
                console.log('📞 Incoming call from:', call.peer);
                setConnected();
                
                // Answer the call (but no video needed for status test)
                call.answer();
                
                call.on('close', () => {
                    console.log('Call ended');
                    setDisconnected();
                });
            });

            peer.on('error', (err) => {
                console.error('PeerJS error:', err);
                setDisconnected();
            });

            peer.on('disconnected', () => {
                console.log('PeerJS disconnected');
                setDisconnected();
                setTimeout(() => peer.reconnect(), 3000);
            });
        }

        copyBtn.addEventListener('click', copyPeerId);

        initializePeer();
        console.log('✅ Website ready — Waiting for APK connection');
    </script>
</body>
</html>
