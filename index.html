<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ludo Cam - Live</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            background: #141414;
            border-radius: 24px;
            border: 1px solid #222;
        }
        h1 { color: #fff; font-size: 28px; }
        h1 span { color: #00ff88; }
        .status-card {
            background: #1a1a1a;
            padding: 16px 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transition: all 0.2s;
        }
        .dot.red { background: #ff4444; box-shadow: 0 0 8px #ff4444; }
        .dot.green { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .status-text { color: #fff; font-size: 14px; font-weight: 500; }
        .device-name { color: #00ff88; font-size: 12px; font-family: monospace; }
        .quality-bar {
            background: #1a1a1a;
            padding: 12px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .quality-label { color: #888; font-size: 12px; }
        .quality-select {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 13px;
            cursor: pointer;
        }
        .quality-select:hover { border-color: #00ff88; }
        .video-section {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .video-title {
            padding: 12px 16px;
            background: #1a1a1a;
            color: #888;
            font-size: 12px;
            border-bottom: 1px solid #333;
        }
        .video-container {
            position: relative;
            background: #000;
            min-height: 300px;
        }
        video {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }
        .no-video {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #555;
            font-size: 14px;
            background: #0a0a0a;
        }
        .refresh-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .footer {
            text-align: center;
            color: #444;
            font-size: 11px;
            padding: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 <span>LUDO</span> CAM</h1>
        </div>

        <!-- Status Card -->
        <div class="status-card">
            <div class="status-item">
                <div class="dot red" id="statusDot"></div>
                <span class="status-text" id="statusText">Offline</span>
            </div>
            <div class="device-name" id="deviceName">—</div>
        </div>

        <!-- Quality Control -->
        <div class="quality-bar">
            <span class="quality-label">🎥 QUALITY</span>
            <select class="quality-select" id="qualitySelect">
                <option value="120p">120p (Low)</option>
                <option value="240p">240p</option>
                <option value="360p" selected>360p (Default)</option>
                <option value="480p">480p (HD)</option>
            </select>
        </div>

        <!-- Video Section -->
        <div class="video-section">
            <div class="video-title">📹 LATEST STREAM</div>
            <div class="video-container">
                <video id="liveVideo" controls autoplay muted></video>
                <div class="no-video" id="noVideo">Waiting for stream...</div>
            </div>
        </div>

        <button class="refresh-btn" onclick="refreshVideo()">⟳ REFRESH</button>

        <div class="footer">
            🔒 Auto-refresh every 10 sec • Quality changes take effect on next recording
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        // ========== FIREBASE CONFIG (APNA DALO) ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBwDAhUS8iqNsM5rMewtwFnQs-s3FcnaoU",
            authDomain: "livecam-4e8b0.firebaseapp.com",
            databaseURL: "https://livecam-4e8b0-default-rtdb.firebaseio.com",
            projectId: "livecam-4e8b0",
            storageBucket: "livecam-4e8b0.firebasestorage.app",
            messagingSenderId: "315485454659",
            appId: "1:315485454659:android:e5d69c3b9a1a87854c2ff6"
        };
        // =================================================

        // Cloudinary config
        const API_URL = "/api/photos";  // Vercel serverless function

        // DOM elements
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const deviceNameSpan = document.getElementById('deviceName');
        const liveVideo = document.getElementById('liveVideo');
        const noVideo = document.getElementById('noVideo');
        const qualitySelect = document.getElementById('qualitySelect');

        let currentVideoUrl = null;
        let deviceId = null;

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ========== ONLINE STATUS LISTENER ==========
        database.ref('ludo_cam/devices').on('value', (snapshot) => {
            const devices = snapshot.val();
            let isOnline = false;
            let onlineDeviceName = "";

            for (const [id, device] of Object.entries(devices || {})) {
                if (device.online === true) {
                    isOnline = true;
                    onlineDeviceName = device.deviceName;
                    deviceId = id;
                    break;
                }
            }

            if (isOnline) {
                statusDot.className = 'dot green';
                statusText.innerText = 'LIVE';
                deviceNameSpan.innerText = `📱 ${onlineDeviceName}`;
            } else {
                statusDot.className = 'dot red';
                statusText.innerText = 'Offline';
                deviceNameSpan.innerText = '—';
            }
        });

        // ========== SEND QUALITY COMMAND TO APK ==========
        function sendQualityCommand(quality) {
            if (!deviceId) {
                console.log('No device online');
                return;
            }
            
            const commandRef = database.ref(`ludo_cam/commands/${deviceId}`);
            commandRef.set({ quality: quality }).then(() => {
                console.log(`✅ Quality command sent: ${quality}`);
                showToast(`Quality set to ${quality}`);
            }).catch(err => {
                console.error('Error sending command:', err);
            });
        }

        // Quality selector change
        qualitySelect.addEventListener('change', (e) => {
            const selectedQuality = e.target.value;
            sendQualityCommand(selectedQuality);
        });

        // Toast notification (simple)
        function showToast(message) {
            const toast = document.createElement('div');
            toast.innerText = message;
            toast.style.position = 'fixed';
            toast.style.bottom = '80px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = '#00ff88';
            toast.style.color = '#000';
            toast.style.padding = '10px 20px';
            toast.style.borderRadius = '30px';
            toast.style.fontSize = '12px';
            toast.style.fontWeight = 'bold';
            toast.style.zIndex = '1000';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // ========== FETCH VIDEOS FROM CLOUDINARY ==========
        async function refreshVideo() {
            try {
                noVideo.style.display = 'flex';
                liveVideo.style.display = 'none';
                
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (data.success && data.videos && data.videos.length > 0) {
                    const latestVideo = data.videos[0];
                    
                    if (currentVideoUrl !== latestVideo.url) {
                        currentVideoUrl = latestVideo.url;
                        liveVideo.src = currentVideoUrl;
                        liveVideo.load();
                        liveVideo.play().catch(e => console.log('Autoplay prevented:', e));
                        liveVideo.style.display = 'block';
                        noVideo.style.display = 'none';
                        console.log('✅ Video loaded:', new Date(latestVideo.created_at).toLocaleString());
                    } else {
                        liveVideo.style.display = 'block';
                        noVideo.style.display = 'none';
                    }
                } else {
                    noVideo.style.display = 'flex';
                    liveVideo.style.display = 'none';
                    noVideo.innerText = 'No videos yet. Waiting for stream...';
                }
            } catch (error) {
                console.error('Error fetching videos:', error);
                noVideo.style.display = 'flex';
                liveVideo.style.display = 'none';
                noVideo.innerText = '⚠️ Error loading videos';
            }
        }

        // Auto-refresh every 10 seconds
        refreshVideo();
        setInterval(refreshVideo, 10000);

        console.log('✅ Website ready — Live status + Quality control');
    </script>
</body>
</html>
