<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Camera Controller</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0f172a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #22c55e, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }
        
        /* Status Card */
        .status-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #334155;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        .status-dot.online {
            background: #22c55e;
            animation: pulse 1.5s infinite;
        }
        
        .status-dot.offline {
            background: #ef4444;
        }
        
        .status-dot.connecting {
            background: #f59e0b;
        }
        
        .device-name {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 8px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Device List */
        .device-section {
            background: #1e293b;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        
        .section-title {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 12px;
        }
        
        .device-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        
        .device-scroll::-webkit-scrollbar {
            height: 3px;
        }
        
        .device-scroll::-webkit-scrollbar-track {
            background: #334155;
            border-radius: 10px;
        }
        
        .device-scroll::-webkit-scrollbar-thumb {
            background: #22c55e;
            border-radius: 10px;
        }
        
        .device-chip {
            background: #0f172a;
            border: 1.5px solid #334155;
            border-radius: 40px;
            padding: 8px 18px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .device-chip.active {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
        }
        
        .no-device {
            text-align: center;
            padding: 20px;
            color: #64748b;
            font-size: 13px;
        }
        
        /* Video Container */
        .video-container {
            background: #000000;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 16px;
        }
        
        #streamImg {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .video-placeholder {
            position: absolute;
            text-align: center;
            color: #475569;
        }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border: 1px solid #334155;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #22c55e;
        }
        
        .stat-label {
            font-size: 10px;
            color: #64748b;
            margin-top: 4px;
        }
        
        /* Quality Buttons */
        .quality-section {
            margin-bottom: 20px;
        }
        
        .quality-title {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        
        .quality-buttons {
            display: flex;
            gap: 12px;
        }
        
        .quality-btn {
            flex: 1;
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .quality-btn.active {
            background: #22c55e;
            border-color: #22c55e;
        }
        
        /* Control Buttons */
        .control-buttons {
            display: flex;
            gap: 12px;
        }
        
        .control-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .control-btn:active {
            transform: scale(0.97);
        }
        
        .btn-start {
            background: #22c55e;
            color: white;
        }
        
        .btn-stop {
            background: #ef4444;
            color: white;
        }
        
        .btn-flip {
            background: #3b82f6;
            color: white;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📷 Camera Controller</h1>
            <p>Live Stream from Android</p>
        </div>
        
        <!-- Status Card -->
        <div class="status-card">
            <div class="status-badge" id="statusBadge">
                <div class="status-dot connecting"></div>
                <span id="statusText">CONNECTING...</span>
            </div>
            <div class="device-name" id="deviceNameSpan">No device selected</div>
        </div>
        
        <!-- Device Section -->
        <div class="device-section">
            <div class="section-title">📱 Connected Devices <span id="deviceCount">(0)</span></div>
            <div class="device-scroll" id="deviceList">
                <div class="no-device">No device connected</div>
            </div>
        </div>
        
        <!-- Video Section -->
        <div class="video-container">
            <img id="streamImg" src="">
            <div class="video-placeholder" id="videoPlaceholder">
                <div style="font-size: 48px; margin-bottom: 8px;">📹</div>
                <div>Waiting for stream...</div>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="fps">0</div>
                <div class="stat-label">FPS</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="resolution">-</div>
                <div class="stat-label">Resolution</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="qualityLabel">-</div>
                <div class="stat-label">Quality</div>
            </div>
        </div>
        
        <!-- Quality Section -->
        <div class="quality-section">
            <div class="quality-title">🎨 Stream Quality</div>
            <div class="quality-buttons">
                <button class="quality-btn" data-quality="140p">140p</button>
                <button class="quality-btn active" data-quality="240p">240p</button>
                <button class="quality-btn" data-quality="360p">360p</button>
            </div>
        </div>
        
        <!-- Control Buttons -->
        <div class="control-buttons">
            <button class="control-btn btn-start" id="startBtn">▶ START</button>
            <button class="control-btn btn-stop" id="stopBtn">⏹ STOP</button>
            <button class="control-btn btn-flip" id="flipBtn">🔄 FLIP</button>
        </div>
    </div>
    
    <script>
        // 🔴 YAHAN APNA REPLIT URL DALO 🔴
        const REPLIT_URL = "https://6795be6b-33cf-4a26-879d-40e530e0adfc-00-1mxip7v201lp.pike.replit.dev";
        
        let socket;
        let currentDevice = null;
        let frameCount = 0;
        let lastTime = Date.now();
        let connectedDevices = new Map();
        
        // DOM Elements
        const statusBadge = document.getElementById('statusBadge');
        const statusTextSpan = document.getElementById('statusText');
        const deviceNameSpan = document.getElementById('deviceNameSpan');
        const deviceListDiv = document.getElementById('deviceList');
        const deviceCountSpan = document.getElementById('deviceCount');
        const streamImg = document.getElementById('streamImg');
        const videoPlaceholder = document.getElementById('videoPlaceholder');
        const fpsSpan = document.getElementById('fps');
        const resolutionSpan = document.getElementById('resolution');
        const qualityLabelSpan = document.getElementById('qualityLabel');
        
        // Connect to server
        function connectSocket() {
            socket = io(REPLIT_URL, {
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: 20,
                reconnectionDelay: 1000
            });
            
            socket.on('connect', () => {
                statusBadge.innerHTML = '<div class="status-dot online"></div><span>ONLINE</span>';
                statusTextSpan.textContent = 'ONLINE';
                showToast('Connected to server');
            });
            
            socket.on('disconnect', () => {
                statusBadge.innerHTML = '<div class="status-dot offline"></div><span>OFFLINE</span>';
                statusTextSpan.textContent = 'OFFLINE';
                showToast('Disconnected');
            });
            
            socket.on('connect_error', () => {
                statusBadge.innerHTML = '<div class="status-dot connecting"></div><span>CONNECTING...</span>';
                statusTextSpan.textContent = 'CONNECTING...';
            });
            
            socket.on('device_list_update', (devices) => {
                if (Array.isArray(devices)) {
                    connectedDevices.clear();
                    devices.forEach(d => connectedDevices.set(d.id, d));
                    updateDeviceList();
                }
            });
            
            socket.on('device_connected', (devices) => {
                if (Array.isArray(devices)) {
                    connectedDevices.clear();
                    devices.forEach(d => connectedDevices.set(d.id, d));
                } else if (devices && devices.id) {
                    connectedDevices.set(devices.id, devices);
                }
                updateDeviceList();
                showToast('Device connected');
            });
            
            socket.on('device_disconnected', (deviceId) => {
                connectedDevices.delete(deviceId);
                if (currentDevice === deviceId) {
                    currentDevice = null;
                    deviceNameSpan.textContent = 'No device selected';
                    streamImg.src = '';
                    videoPlaceholder.style.display = 'flex';
                }
                updateDeviceList();
                showToast('Device disconnected');
            });
            
            socket.on('frame', (data) => {
                if (currentDevice && data) {
                    streamImg.src = data;
                    frameCount++;
                    videoPlaceholder.style.display = 'none';
                }
            });
            
            socket.on('resolution_update', ({ deviceId, width, height, quality }) => {
                if (currentDevice === deviceId) {
                    resolutionSpan.textContent = `${width}x${height}`;
                    qualityLabelSpan.textContent = quality;
                }
            });
        }
        
        function updateDeviceList() {
            deviceCountSpan.textContent = `(${connectedDevices.size})`;
            
            if (connectedDevices.size === 0) {
                deviceListDiv.innerHTML = '<div class="no-device">No device connected</div>';
                return;
            }
            
            let html = '';
            connectedDevices.forEach((device, id) => {
                const isActive = currentDevice === id;
                html += `<div class="device-chip ${isActive ? 'active' : ''}" onclick="selectDevice('${id}')">${device.name}</div>`;
            });
            deviceListDiv.innerHTML = html;
        }
        
        function selectDevice(deviceId) {
            currentDevice = deviceId;
            const device = connectedDevices.get(deviceId);
            deviceNameSpan.textContent = device.name;
            updateDeviceList();
            streamImg.src = '';
            videoPlaceholder.style.display = 'flex';
            resolutionSpan.textContent = '-';
            qualityLabelSpan.textContent = '-';
            showToast(`Connected to ${device.name}`);
        }
        
        // FPS Counter
        function updateFPS() {
            const now = Date.now();
            if (now - lastTime >= 1000) {
                fpsSpan.textContent = frameCount;
                frameCount = 0;
                lastTime = now;
            }
            requestAnimationFrame(updateFPS);
        }
        updateFPS();
        
        // Controls
        document.getElementById('startBtn').onclick = () => {
            if (!currentDevice) { showToast('Select a device first'); return; }
            socket.emit('command', 'start');
            showToast('Starting stream...');
        };
        
        document.getElementById('stopBtn').onclick = () => {
            if (!currentDevice) { showToast('Select a device first'); return; }
            socket.emit('command', 'stop');
            showToast('Stopping stream...');
            videoPlaceholder.style.display = 'flex';
            videoPlaceholder.innerHTML = '<div style="font-size:48px;margin-bottom:8px;">⏸</div><div>Stream stopped</div>';
        };
        
        document.getElementById('flipBtn').onclick = () => {
            if (!currentDevice) { showToast('Select a device first'); return; }
            socket.emit('command', 'flip');
            showToast('Flipping camera...');
        };
        
        document.querySelectorAll('.quality-btn').forEach(btn => {
            btn.onclick = () => {
                if (!currentDevice) { showToast('Select a device first'); return; }
                document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const quality = btn.dataset.quality;
                let width, height;
                if (quality === '140p') { width = 160; height = 120; }
                else if (quality === '240p') { width = 320; height = 240; }
                else { width = 480; height = 360; }
                socket.emit('quality', { quality, width, height });
                showToast(`Quality: ${quality}`);
            };
        });
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        // Start
        connectSocket();
    </script>
</body>
</html>
