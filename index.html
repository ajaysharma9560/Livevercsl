<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live Camera Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: #111;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        
        /* Header */
        .header {
            background: #1a1a1a;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
        }
        
        .logo {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }
        
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #222;
            padding: 6px 12px;
            border-radius: 20px;
        }
        
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        
        .dot.red {
            background-color: #ff4444;
            box-shadow: 0 0 6px #ff4444;
        }
        
        .dot.green {
            background-color: #00ff88;
            box-shadow: 0 0 6px #00ff88;
        }
        
        .dot.yellow {
            background-color: #ffaa00;
            box-shadow: 0 0 6px #ffaa00;
        }
        
        .status-text {
            color: #fff;
            font-size: 12px;
            font-weight: 500;
        }
        
        /* Device Info */
        .device-info {
            background: #1e1e1e;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
        }
        
        .device-name {
            color: #00ff88;
            font-size: 14px;
            font-weight: 500;
        }
        
        .device-id {
            color: #666;
            font-size: 11px;
            font-family: monospace;
        }
        
        /* Video Player */
        .video-wrapper {
            background: #000;
            aspect-ratio: 16 / 9;
            position: relative;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .placeholder {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            color: #555;
            font-size: 14px;
            gap: 12px;
        }
        
        /* Controls */
        .controls {
            background: #1a1a1a;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .quality-badge {
            background: #222;
            padding: 6px 12px;
            border-radius: 16px;
            color: #888;
            font-size: 12px;
            font-family: monospace;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
        }
        
        .action-btn {
            background: #222;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .action-btn:active {
            transform: scale(0.95);
        }
        
        .action-btn.live {
            background: #ff4444;
            color: white;
        }
        
        .action-btn.photo {
            background: #2a2a2a;
        }
        
        /* Footer */
        .footer {
            background: #141414;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #222;
        }
        
        .footer-item {
            text-align: center;
            flex: 1;
            color: #666;
            font-size: 11px;
        }
        
        .recording {
            color: #ff4444;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">📹 LiveCam</div>
            <div class="status-badge">
                <div class="dot red" id="statusDot"></div>
                <span class="status-text" id="statusText">Disconnected</span>
            </div>
        </div>
        
        <!-- Device Info -->
        <div class="device-info">
            <div>
                <div class="device-name" id="deviceName">—</div>
                <div class="device-id" id="deviceId">No device connected</div>
            </div>
            <div class="quality-badge" id="qualityBadge">1080p</div>
        </div>
        
        <!-- Video Player -->
        <div class="video-wrapper">
            <video id="remoteVideo" autoplay playsinline muted></video>
            <div class="placeholder" id="placeholder">
                <div>📱</div>
                <div>Waiting for device...</div>
                <div style="font-size: 11px;">Connect your phone to start streaming</div>
            </div>
        </div>
        
        <!-- Controls -->
        <div class="controls">
            <div class="quality-badge">
                <span id="connectionType">WebRTC</span>
            </div>
            <div class="action-buttons">
                <button class="action-btn live" id="liveBtn">● LIVE</button>
                <button class="action-btn photo" id="photoBtn">📷 PHOTO</button>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <div class="footer-item">📡 <span id="channelName">camera_room_123</span></div>
            <div class="footer-item">⚡ <span id="pingTime">0</span> ms</div>
            <div class="footer-item recording" id="recStatus">● REC</div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script>
        // ========== CONFIGURATION ==========
        const ROOM_ID = "camera_room_123";
        const SIGNAL_SERVER = "https://server-2-hwtd.onrender.com";
        // ===================================
        
        const remoteVideo = document.getElementById('remoteVideo');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const deviceNameSpan = document.getElementById('deviceName');
        const deviceIdSpan = document.getElementById('deviceId');
        const placeholder = document.getElementById('placeholder');
        const qualityBadge = document.getElementById('qualityBadge');
        const pingTimeSpan = document.getElementById('pingTime');
        const channelNameSpan = document.getElementById('channelName');
        
        let pc = null;
        let socket = null;
        let startTime = null;
        
        channelNameSpan.innerText = ROOM_ID;
        
        const configuration = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" },
                { urls: "stun:stun2.l.google.com:19302" }
            ]
        };
        
        function updateStatus(state, text, deviceName = null, deviceId = null) {
            statusText.innerText = text;
            
            if (state === 'connected') {
                statusDot.className = 'dot green';
                placeholder.classList.add('hidden');
                qualityBadge.innerText = 'HD LIVE';
                if (deviceName) {
                    deviceNameSpan.innerText = deviceName;
                }
                if (deviceId) {
                    deviceIdSpan.innerText = deviceId;
                }
            } else if (state === 'connecting') {
                statusDot.className = 'dot yellow';
                statusText.innerText = text;
                placeholder.classList.remove('hidden');
                deviceNameSpan.innerText = '—';
                deviceIdSpan.innerText = 'Connecting...';
                qualityBadge.innerText = 'WAITING';
            } else {
                statusDot.className = 'dot red';
                statusText.innerText = text;
                placeholder.classList.remove('hidden');
                deviceNameSpan.innerText = '—';
                deviceIdSpan.innerText = 'No device connected';
                qualityBadge.innerText = 'OFFLINE';
                if (remoteVideo.srcObject) {
                    remoteVideo.srcObject = null;
                }
            }
        }
        
        async function createPeerConnection() {
            if (pc) {
                pc.close();
            }
            
            pc = new RTCPeerConnection(configuration);
            
            pc.ontrack = (event) => {
                if (event.track.kind === 'video') {
                    remoteVideo.srcObject = event.streams[0];
                    updateStatus('connected', 'LIVE', deviceNameSpan.innerText, deviceIdSpan.innerText);
                }
            };
            
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('signal', {
                        room: ROOM_ID,
                        from: 'web',
                        signal: event.candidate
                    });
                }
            };
            
            pc.oniceconnectionstatechange = () => {
                if (pc.iceConnectionState === 'connected') {
                    // Calculate ping
                    if (startTime) {
                        const ping = Date.now() - startTime;
                        pingTimeSpan.innerText = ping;
                    }
                } else if (pc.iceConnectionState === 'disconnected') {
                    updateStatus('disconnected', 'Disconnected');
                    remoteVideo.srcObject = null;
                }
            };
            
            return pc;
        }
        
        async function start() {
            updateStatus('connecting', 'Connecting...');
            
            socket = io(SIGNAL_SERVER, {
                transports: ['websocket'],
                reconnection: true,
                reconnectionAttempts: 10,
                reconnectionDelay: 2000
            });
            
            socket.on('connect', () => {
                console.log('Connected to signal server');
                updateStatus('connecting', 'Waiting for device...');
                socket.emit('join-room', ROOM_ID, 'web');
            });
            
            socket.on('user-joined', async (userId) => {
                console.log('Device joined:', userId);
                updateStatus('connecting', 'Device connected, starting...');
                startTime = Date.now();
                
                if (!pc) await createPeerConnection();
                
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                
                socket.emit('signal', {
                    room: ROOM_ID,
                    from: 'web',
                    signal: offer
                });
            });
            
            socket.on('signal', async (data) => {
                if (!pc) await createPeerConnection();
                
                if (data.signal.type === 'answer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
                } else if (data.signal.candidate) {
                    await pc.addIceCandidate(new RTCIceCandidate(data.signal));
                }
            });
            
            socket.on('user-left', () => {
                if (pc) {
                    pc.close();
                    pc = null;
                }
                remoteVideo.srcObject = null;
                updateStatus('disconnected', 'Device disconnected');
            });
            
            socket.on('disconnect', () => {
                updateStatus('disconnected', 'Server lost');
            });
        }
        
        // Photo button - capture screenshot
        document.getElementById('photoBtn').addEventListener('click', () => {
            if (remoteVideo.srcObject) {
                const canvas = document.createElement('canvas');
                canvas.width = remoteVideo.videoWidth;
                canvas.height = remoteVideo.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(remoteVideo, 0, 0, canvas.width, canvas.height);
                
                const link = document.createElement('a');
                link.download = `snapshot_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
                
                // Visual feedback
                const btn = document.getElementById('photoBtn');
                btn.style.background = '#00ff88';
                setTimeout(() => {
                    btn.style.background = '#2a2a2a';
                }, 200);
            }
        });
        
        // Live button - reconnect
        document.getElementById('liveBtn').addEventListener('click', () => {
            if (pc) {
                pc.close();
                pc = null;
            }
            start();
        });
        
        start();
        
        // Ping every second
        setInterval(() => {
            if (pc && pc.iceConnectionState === 'connected') {
                // Ping remains
            }
        }, 1000);
    </script>
</body>
                                              </html>
