<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live Camera Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📷 Live Camera Monitor</h1>
            <div class="status-card">
                <div class="status-indicator">
                    <span id="onlineDot" class="dot offline"></span>
                    <span id="onlineText">Offline</span>
                </div>
                <div class="camera-status" id="cameraStatus">
                    <span id="cameraDot" class="dot offline"></span>
                    <span id="cameraText">Camera Inactive</span>
                </div>
                <div class="resolution-badge" id="resolutionBadge">240p</div>
            </div>
        </div>

        <div class="video-container">
            <img id="liveImage" src="" alt="Live Stream">
            <div id="placeholder" class="placeholder">
                📷 No active stream<br>
                Click START to begin monitoring
            </div>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn-start">▶ START LIVE</button>
            <button id="stopBtn" class="btn-stop" disabled>⏹ STOP LIVE</button>
        </div>

        <div class="settings-panel">
            <div class="setting-group">
                <label>📐 Resolution:</label>
                <div class="resolution-buttons">
                    <button id="res120p" class="res-btn" data-res="120p">120p 💾 Low Data</button>
                    <button id="res240p" class="res-btn active" data-res="240p">240p 📱 Medium</button>
                    <button id="res360p" class="res-btn" data-res="360p">360p 🎥 High Quality</button>
                </div>
            </div>
            <div class="setting-group">
                <button id="flipBtn" class="flip-btn">🔄 Flip Camera (Front/Back)</button>
            </div>
        </div>

        <div class="info-panel">
            <div class="info-item">📱 Device: <span id="deviceId">device001</span></div>
            <div class="info-item">🕐 Last Seen: <span id="lastSeen">Never</span></div>
            <div class="info-item">📊 Data Usage: <span id="dataMode">Medium</span></div>
            <div class="info-item">🔴 Stream Status: <span id="streamStatus" class="offline-text">Idle</span></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
