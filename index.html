<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ludoo Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ========== HEADER ========== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(0,0,0,0.8);
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }

        .back-btn {
            background: none;
            border: none;
            color: #00ff88;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .back-btn span {
            font-size: 14px;
            font-weight: 500;
        }

        .status-badge {
            background: rgba(0,255,136,0.2);
            padding: 6px 14px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
            animation: pulse 1.5s infinite;
        }

        .status-text {
            color: #00ff88;
            font-size: 12px;
            font-weight: 500;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ========== STREAM CONTAINER ========== */
        .stream-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            position: relative;
            min-height: 0;
        }

        .stream-wrapper {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: #0a0a0a;
        }

        .stream-image {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            background: #0a0a0a;
            display: block;
        }

        .quality-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            color: #00ff88;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .timer-tag {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-family: monospace;
            color: #ffffff;
        }

        /* ========== DEVICE SELECTOR ========== */
        .device-section {
            padding: 12px 20px;
            background: #0a0a0a;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }

        .device-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .device-label {
            color: #888;
            font-size: 12px;
            font-weight: 500;
        }

        select {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        /* ========== CONTROL BUTTONS ========== */
        .controls {
            padding: 20px;
            background: #0a0a0a;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .ctrl-btn {
            background: #1a1a1a;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 100px;
            justify-content: center;
        }

        .ctrl-btn:active {
            transform: scale(0.96);
        }

        .start-btn {
            background: #00ff88;
            color: #000;
            box-shadow: 0 0 12px rgba(0,255,136,0.3);
        }

        .stop-btn {
            background: #ff4444;
            color: #fff;
        }

        .flip-btn {
            background: #ff8800;
            color: #000;
        }

        .quality-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .quality-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: #ccc;
        }

        .quality-btn.active {
            background: #00ff88;
            color: #000;
            border-color: #00ff88;
        }

        /* ========== READY BANNER ========== */
        .ready-banner {
            text-align: center;
            padding: 12px;
            background: rgba(0,255,136,0.05);
            border-top: 0.5px solid rgba(0,255,136,0.2);
        }

        .ready-text {
            color: #00ff88;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* ========== LOADING ========== */
        .loading-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            aspect-ratio: 4 / 3;
            background: #0a0a0a;
            color: #555;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 480px) {
            .ctrl-btn {
                padding: 12px 20px;
                font-size: 14px;
                min-width: 80px;
            }
            .quality-btn {
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <button class="back-btn" onclick="goBack()">
            ← <span>BACK</span>
        </button>
        <div class="status-badge">
            <div class="status-dot"></div>
            <span class="status-text" id="connectionStatus">READY</span>
        </div>
    </div>

    <!-- STREAM AREA -->
    <div class="stream-container">
        <div class="stream-wrapper">
            <img id="streamImage" class="stream-image" src="">
            <div class="quality-tag" id="qualityTag">360p</div>
            <div class="timer-tag" id="timerTag">00:00</div>
        </div>
    </div>

    <!-- DEVICE SELECTOR -->
    <div class="device-section">
        <div class="device-selector">
            <span class="device-label">📱 DEVICE</span>
            <select id="deviceSelect" onchange="onDeviceChange()">
                <option value="">-- Select Device --</option>
            </select>
        </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
        <div class="row">
            <button class="ctrl-btn start-btn" onclick="sendCommand('start')">▶ START</button>
            <button class="ctrl-btn stop-btn" onclick="sendCommand('stop')">⏹ STOP</button>
            <button class="ctrl-btn flip-btn" onclick="sendCommand('flip')">🔄 FLIP</button>
        </div>
        <div class="quality-group" id="qualityGroup">
            <button class="quality-btn" data-quality="140p" onclick="sendQuality('140p')">🌫 140p</button>
            <button class="quality-btn" data-quality="240p" onclick="sendQuality('240p')">📱 240p</button>
            <button class="quality-btn active" data-quality="360p" onclick="sendQuality('360p')">📷 360p</button>
        </div>
    </div>

    <!-- READY BANNER -->
    <div class="ready-banner">
        <div class="ready-text">● READY ● STREAMING</div>
    </div>

    <script>
        // ============================================
        // 🔴 APNA BACKEND URL (REPLIT) YAHAN DALO 🔴
        // ============================================
        const BACKEND_URL = "https://82306eb9-62b1-4fe6-b0a3-387ab54422bf-00-1rxob9p4mcemw.sisko.replit.dev";
        
        // ============================================
        // VARIABLES
        // ============================================
        let currentDeviceId = null;
        let streamInterval = null;
        let currentQuality = "360p";
        let streamStartTime = null;
        let timerInterval = null;
        
        // ============================================
        // TIMER UPDATE
        // ============================================
        function updateTimer() {
            if (!streamStartTime) {
                document.getElementById('timerTag').innerText = '00:00';
                return;
            }
            const elapsed = Math.floor((Date.now() - streamStartTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            document.getElementById('timerTag').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            streamStartTime = Date.now();
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }
        
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            streamStartTime = null;
            document.getElementById('timerTag').innerText = '00:00';
        }
        
        // ============================================
        // LOAD DEVICES LIST
        // ============================================
        async function loadDevices() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/devices`);
                const data = await response.json();
                const select = document.getElementById('deviceSelect');
                const oldValue = select.value;
                
                if (data.success && data.devices && data.devices.length > 0) {
                    let options = '<option value="">-- Select Device --</option>';
                    data.devices.forEach(device => {
                        options += `<option value="${device.device_id}">📱 ${device.device_name}</option>`;
                    });
                    select.innerHTML = options;
                    
                    if (oldValue && data.devices.find(d => d.device_id === oldValue)) {
                        select.value = oldValue;
                    } else if (select.value !== currentDeviceId) {
                        if (currentDeviceId && data.devices.find(d => d.device_id === currentDeviceId)) {
                            select.value = currentDeviceId;
                        }
                    }
                    
                    document.getElementById('connectionStatus').innerHTML = 'READY';
                    document.getElementById('connectionStatus').style.color = '#00ff88';
                } else {
                    select.innerHTML = '<option value="">-- No Devices --</option>';
                    document.getElementById('connectionStatus').innerHTML = 'WAITING';
                    document.getElementById('connectionStatus').style.color = '#ffaa00';
                }
            } catch (e) {
                console.error('Load devices error:', e);
                document.getElementById('connectionStatus').innerHTML = 'OFFLINE';
                document.getElementById('connectionStatus').style.color = '#ff4444';
            }
        }
        
        // ============================================
        // DEVICE CHANGE
        // ============================================
        function onDeviceChange() {
            const select = document.getElementById('deviceSelect');
            currentDeviceId = select.value;
            
            if (streamInterval) {
                clearInterval(streamInterval);
                streamInterval = null;
            }
            stopTimer();
            
            if (currentDeviceId) {
                startStreaming();
                document.getElementById('connectionStatus').innerHTML = 'CONNECTED';
                document.getElementById('connectionStatus').style.color = '#00ff88';
            } else {
                document.getElementById('streamImage').src = '';
                document.getElementById('connectionStatus').innerHTML = 'READY';
            }
        }
        
        // ============================================
        // START STREAMING (MJPEG)
        // ============================================
        function startStreaming() {
            if (streamInterval) clearInterval(streamInterval);
            
            const img = document.getElementById('streamImage');
            const updateFrame = () => {
                if (currentDeviceId) {
                    img.src = `${BACKEND_URL}/api/frame.jpg?device_id=${currentDeviceId}&t=${Date.now()}`;
                }
            };
            
            updateFrame();
            streamInterval = setInterval(updateFrame, 100);
            startTimer();
        }
        
        // ============================================
        // SEND COMMAND
        // ============================================
        async function sendCommand(cmd) {
            if (!currentDeviceId) {
                alert('Please select a device first!');
                return;
            }
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/command?cmd=${cmd}&device_id=${currentDeviceId}`);
                const result = await response.json();
                
                if (result.success) {
                    console.log(`✅ Command ${cmd} sent`);
                    document.getElementById('connectionStatus').innerHTML = cmd.toUpperCase();
                    setTimeout(() => {
                        document.getElementById('connectionStatus').innerHTML = 'READY';
                    }, 1000);
                }
            } catch (e) {
                console.error('Command error:', e);
            }
        }
        
        // ============================================
        // SEND QUALITY
        // ============================================
        async function sendQuality(quality) {
            if (!currentDeviceId) {
                alert('Please select a device first!');
                return;
            }
            
            currentQuality = quality;
            document.getElementById('qualityTag').innerHTML = quality;
            
            // Update active class on buttons
            document.querySelectorAll('.quality-btn').forEach(btn => {
                if (btn.getAttribute('data-quality') === quality) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            try {
                await fetch(`${BACKEND_URL}/api/quality?quality=${quality}&device_id=${currentDeviceId}`);
                console.log(`✅ Quality ${quality} sent`);
            } catch (e) {
                console.error('Quality error:', e);
            }
        }
        
        // ============================================
        // BACK BUTTON (Virtual back)
        // ============================================
        function goBack() {
            // Just visual feedback - no actual navigation
            console.log('Back pressed');
        }
        
        // ============================================
        // AUTO REFRESH DEVICES
        // ============================================
        loadDevices();
        setInterval(loadDevices, 5000);
        
        // ============================================
        // INITIAL QUALITY TAG
        // ============================================
        document.getElementById('qualityTag').innerHTML = '360p';
    </script>
</body>
</html>
