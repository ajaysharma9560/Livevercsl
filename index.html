<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live Camera Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #000000, #1a1a2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
        }
        
        .stream-card {
            background: rgba(0,0,0,0.6);
            border-radius: 24px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        h1 {
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        .video-container {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        
        #streamImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            margin-bottom: 15px;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        .status-dot.online {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
        }
        
        .status-dot.offline {
            background: #ef4444;
        }
        
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .fps-counter {
            background: rgba(0,0,0,0.7);
            padding: 4px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 14px;
            color: #22c55e;
        }
        
        .info-text {
            color: #94a3b8;
            font-size: 12px;
            margin-top: 15px;
        }
        
        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .refresh-btn:hover {
            background: #2563eb;
        }
        
        .control-link {
            display: inline-block;
            margin-top: 15px;
            color: #3b82f6;
            text-decoration: none;
            font-size: 14px;
        }
        
        .control-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="stream-card">
            <h1>📹 Live Camera Stream</h1>
            
            <div class="status-bar">
                <div class="status">
                    <div class="status-dot offline" id="statusDot"></div>
                    <span id="statusText" style="color: white;">Offline</span>
                </div>
                <div class="fps-counter" id="fpsCounter">FPS: 0</div>
            </div>
            
            <div class="video-container">
                <img id="streamImage" src="" alt="Camera Stream">
            </div>
            
            <div class="info-text" id="infoText">
                ⚠️ Waiting for camera stream...
            </div>
            
            <button class="refresh-btn" onclick="refreshStream()">🔄 Refresh Stream</button>
            <br>
            <a href="https://419912f0-d172-48ee-9a90-39cb4382d3a8-00-1cn1xz6d2vo8g.sisko.replit.dev/" target="_blank" class="control-link">🎮 Open Control Panel</a>
        </div>
    </div>

    <script>
        // 🔴🔴🔴 MJPEG STREAM URL 🔴🔴🔴
        const STREAM_URL = "https://419912f0-d172-48ee-9a90-39cb4382d3a8-00-1cn1xz6d2vo8g.sisko.replit.dev/stream";
        
        const streamImage = document.getElementById('streamImage');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const fpsCounter = document.getElementById('fpsCounter');
        const infoText = document.getElementById('infoText');
        
        let frameCount = 0;
        let lastFpsUpdate = Date.now();
        let reconnectAttempts = 0;
        let imageLoadTimeout = null;
        
        // Update FPS counter
        function updateFPS() {
            const now = Date.now();
            if (now - lastFpsUpdate >= 1000) {
                fpsCounter.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = now;
            }
            requestAnimationFrame(updateFPS);
        }
        updateFPS();
        
        // Refresh stream
        function refreshStream() {
            const urlWithTimestamp = STREAM_URL + '?t=' + new Date().getTime();
            streamImage.src = urlWithTimestamp;
            
            statusDot.className = 'status-dot online';
            statusText.textContent = 'Connecting...';
            statusText.style.color = '#eab308';
            infoText.innerHTML = '🔄 Connecting to stream...';
            
            // Clear timeout if exists
            if (imageLoadTimeout) clearTimeout(imageLoadTimeout);
            
            // Check if image loaded within timeout
            imageLoadTimeout = setTimeout(() => {
                if (!streamImage.complete || streamImage.naturalWidth === 0) {
                    statusDot.className = 'status-dot offline';
                    statusText.textContent = 'Offline';
                    statusText.style.color = '#ef4444';
                    infoText.innerHTML = '⚠️ Stream not available. Make sure camera is ON and START button is pressed.';
                    reconnectAttempts++;
                    
                    if (reconnectAttempts < 3) {
                        infoText.innerHTML += ' Retrying...';
                        setTimeout(refreshStream, 3000);
                    }
                }
            }, 5000);
        }
        
        // Image load success
        streamImage.onload = () => {
            frameCount++;
            statusDot.className = 'status-dot online';
            statusText.textContent = 'Live';
            statusText.style.color = '#22c55e';
            infoText.innerHTML = '✅ Live stream is active';
            reconnectAttempts = 0;
            if (imageLoadTimeout) clearTimeout(imageLoadTimeout);
        };
        
        // Image load error
        streamImage.onerror = () => {
            statusDot.className = 'status-dot offline';
            statusText.textContent = 'Offline';
            statusText.style.color = '#ef4444';
            infoText.innerHTML = '⚠️ Cannot connect to stream. Check if server is running.';
            if (imageLoadTimeout) clearTimeout(imageLoadTimeout);
        };
        
        // Initial load
        refreshStream();
        
        // Auto refresh every 30 seconds (keep alive)
        setInterval(() => {
            if (streamImage.src) {
                refreshStream();
            }
        }, 30000);
    </script>
</body>
</html>
