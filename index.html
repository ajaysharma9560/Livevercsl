<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Camera Stream</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #000000, #1a1a2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        
        .stream-card {
            background: rgba(0,0,0,0.6);
            border-radius: 24px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        h1 {
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        .video-container {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        
        #streamImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            margin-bottom: 15px;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        .status-dot.online {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
        }
        
        .status-dot.offline {
            background: #ef4444;
        }
        
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .fps-counter {
            background: rgba(0,0,0,0.7);
            padding: 4px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 14px;
            color: #22c55e;
        }
        
        .info-text {
            color: #94a3b8;
            font-size: 12px;
            margin-top: 15px;
        }
        
        .device-id {
            font-family: monospace;
            font-size: 11px;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="stream-card">
            <h1>📹 Live Camera Feed</h1>
            
            <div class="status-bar">
                <div class="status">
                    <div class="status-dot offline" id="statusDot"></div>
                    <span id="statusText" style="color: white;">Offline</span>
                </div>
                <div class="fps-counter" id="fpsCounter">FPS: 0</div>
            </div>
            
            <div class="video-container">
                <img id="streamImage" src="" alt="Camera Stream">
            </div>
            
            <div class="info-text" id="infoText">
                Waiting for camera stream...
            </div>
        </div>
    </div>

    <script>
        // 🔴 TERA REPLIT URL - YAHAN DALDO
        const SERVER_URL = "https://8d6e01c7-21b8-48c8-92dd-8d495a1d8fab-00-29vkvkb42sei4.sisko.replit.dev";
        
        const socket = io(SERVER_URL, {
            transports: ['websocket', 'polling'],
            reconnection: true,
            reconnectionAttempts: Infinity,
            reconnectionDelay: 1000
        });
        
        const streamImage = document.getElementById('streamImage');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const fpsCounter = document.getElementById('fpsCounter');
        const infoText = document.getElementById('infoText');
        
        let frameCount = 0;
        let lastFpsUpdate = Date.now();
        
        function updateFPS() {
            const now = Date.now();
            if (now - lastFpsUpdate >= 1000) {
                fpsCounter.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = now;
            }
            requestAnimationFrame(updateFPS);
        }
        updateFPS();
        
        // Receive frame from server
        socket.on('streamFrame', (data) => {
            if (data && data.frame) {
                streamImage.src = data.frame;
                frameCount++;
                
                statusDot.className = 'status-dot online';
                statusText.textContent = 'Live';
                statusText.style.color = '#22c55e';
                infoText.textContent = '✅ Stream is live';
            }
        });
        
        socket.on('connect', () => {
            console.log('Connected to server');
            statusText.textContent = 'Connected';
            statusDot.className = 'status-dot offline';
            infoText.textContent = 'Connected, waiting for stream...';
        });
        
        socket.on('disconnect', () => {
            statusDot.className = 'status-dot offline';
            statusText.textContent = 'Offline';
            statusText.style.color = '#ef4444';
            infoText.textContent = 'Disconnected from server. Reconnecting...';
        });
        
        socket.on('connect_error', (error) => {
            console.error('Connection error:', error);
            statusText.textContent = 'Connection Error';
            infoText.textContent = 'Cannot connect to server. Check if Replit is running.';
        });
    </script>
</body>
</html>
