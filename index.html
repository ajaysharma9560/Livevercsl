<!DOCTYPE html>
<html>
<head>
    <title>Live Stream</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <h1>Live CCTV Stream</h1>
    <img src="https://server-3-phat.onrender.com/stream" 
         style="width:100%; max-width:800px; border:2px solid green;">
    
    <p>Status: <span id="status">Loading...</span></p>
    
    <script>
        const img = document.querySelector('img');
        const status = document.getElementById('status');
        
        img.onload = () => {
            status.innerHTML = '🟢 LIVE';
            status.style.color = 'green';
        };
        
        img.onerror = () => {
            status.innerHTML = '🔴 OFFLINE - Make sure phone app is running';
            status.style.color = 'red';
        };
        
        // Refresh image every second
        setInterval(() => {
            if (img.complete) {
                status.innerHTML = '🟢 LIVE (' + new Date().toLocaleTimeString() + ')';
            }
        }, 1000);
    </script>
</body>
</html>
