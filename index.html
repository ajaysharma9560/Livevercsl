<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live CCTV Stream</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            text-align: center;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #4CAF50;
            margin-bottom: 20px;
        }
        .stream-box {
            background: #000;
            border-radius: 10px;
            padding: 10px;
            border: 2px solid #4CAF50;
        }
        img {
            max-width: 100%;
            border-radius: 5px;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            background: #0f3460;
            border-radius: 5px;
            font-size: 14px;
        }
        .online {
            color: #4CAF50;
            font-weight: bold;
        }
        .controls {
            margin-top: 20px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button.stop {
            background: #f44336;
        }
        button.refresh {
            background: #2196F3;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📹 Live CCTV Stream</h1>
        
        <div class="stream-box">
            <img id="liveFrame" src="" alt="Stream loading...">
        </div>
        
        <div class="status" id="status">
            🔴 Connecting to stream...
        </div>
        
        <div class="controls">
            <button onclick="refreshStream()" class="refresh">🔄 Refresh</button>
        </div>
        
        <div class="footer">
            <p>Server: server-3-phat.onrender.com</p>
            <p>Last update: <span id="timestamp">-</span></p>
        </div>
    </div>

    <script>
        const img = document.getElementById('liveFrame');
        const statusDiv = document.getElementById('status');
        const timestampSpan = document.getElementById('timestamp');
        
        // MJPEG stream URL
        const STREAM_URL = 'https://server-3-phat.onrender.com/stream';
        
        // Set image source to MJPEG stream
        img.src = STREAM_URL;
        
        // Update status when image loads
        img.onload = function() {
            statusDiv.innerHTML = '🟢 LIVE STREAM - Connected';
            statusDiv.style.background = '#0a2a1a';
            timestampSpan.textContent = new Date().toLocaleTimeString();
        };
        
        img.onerror = function() {
            statusDiv.innerHTML = '🔴 OFFLINE - Stream not available. Make sure phone app is running.';
            statusDiv.style.background = '#2a0a0a';
        };
        
        function refreshStream() {
            statusDiv.innerHTML = '🔄 Refreshing...';
            img.src = STREAM_URL + '?t=' + Date.now();
        }
        
        // Refresh every 30 seconds to keep connection alive
        setInterval(() => {
            if (img.complete) {
                timestampSpan.textContent = new Date().toLocaleTimeString();
            }
        }, 1000);
    </script>
</body>
</html>
