<!DOCTYPE html>
<html>
<head>
    <title>Camera Stream Control</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
        }

        button {
            padding: 12px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
        }

        .start { background: #28a745; color: white; }
        .stop { background: #dc3545; color: white; }

        img {
            margin-top: 20px;
            width: 90%;
            max-width: 600px;
            border: 2px solid #444;
        }

        .status {
            margin-top: 10px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>

<body>

<h2>📷 Live Camera Control Panel</h2>

<button class="start" onclick="startStream()">START</button>
<button class="stop" onclick="stopStream()">STOP</button>

<div class="status" id="status">Status: Idle</div>

<br>

<!-- STREAM VIEW -->
<img id="stream" src="https://85196b91-8e83-46cb-9653-6f735ff07ef4-00-vvrapqesa3hf.sisko.replit.dev/stream" />

<script>

const SERVER = "https://85196b91-8e83-46cb-9653-6f735ff07ef4-00-vvrapqesa3hf.sisko.replit.dev";

async function startStream() {
    await fetch(SERVER + "/start", { method: "POST" });
    document.getElementById("status").innerText = "Status: Streaming Started 🔴";
}

async function stopStream() {
    await fetch(SERVER + "/stop", { method: "POST" });
    document.getElementById("status").innerText = "Status: Stopped ⏹";
}

</script>

</body>
</html>
