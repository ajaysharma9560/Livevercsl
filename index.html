<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Controller</title>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>
body { background:#0f172a; color:white; font-family:system-ui; padding:20px; }
.container { max-width:500px; margin:auto; }

.video {
  width:100%;
  aspect-ratio:16/9;
  background:black;
  border-radius:16px;
  overflow:hidden;
  margin-bottom:15px;
  border:2px solid #22c55e;
}

.video img {
  width:100%;
  height:100%;
  object-fit:contain;
}

.status {
  text-align:center;
  margin-bottom:10px;
  color:#22c55e;
}
</style>

</head>

<body>

<div class="container">

  <h2 style="text-align:center;">📷 Live Camera</h2>

  <div class="status" id="status">Connecting...</div>

  <!-- ✅ YOUR STREAM LINK ADDED HERE -->
  <div class="video">
    <img id="streamImg" src="https://0c2c3946-ed81-426e-b5d0-2938f8a721f8-00-2xrleh1hnov2d.pike.replit.dev/stream">
  </div>

  <button onclick="reloadStream()" style="padding:10px;width:100%;border:none;border-radius:20px;background:#22c55e;color:white;">
    🔄 Reload Stream
  </button>

</div>

<script>
const socket = io("https://0c2c3946-ed81-426e-b5d0-2938f8a721f8-00-2xrleh1hnov2d.pike.replit.dev");

socket.on("connect", () => {
  document.getElementById("status").innerText = "🟢 Live Connected";
});

socket.on("disconnect", () => {
  document.getElementById("status").innerText = "🔴 Disconnected";
});

function reloadStream(){
  const img = document.getElementById("streamImg");
  img.src = "https://0c2c3946-ed81-426e-b5d0-2938f8a721f8-00-2xrleh1hnov2d.pike.replit.dev/stream?"+Date.now();
}
</script>

</body>
</html>
