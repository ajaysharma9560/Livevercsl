<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Camera - PeerJS</title>
    <style>
        body {
            background: #0a0a0a;
            color: white;
            text-align: center;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        video {
            width: 100%;
            max-width: 600px;
            border-radius: 20px;
            border: 2px solid #00ff88;
            background: #000;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 16px;
            display: inline-block;
            width: 100%;
            max-width: 400px;
        }
        .connected {
            background: #00ff8822;
            color: #00ff88;
            border: 1px solid #00ff88;
        }
        .disconnected {
            background: #ff444422;
            color: #ff4444;
            border: 1px solid #ff4444;
        }
        .waiting {
            background: #ffaa0022;
            color: #ffaa00;
            border: 1px solid #ffaa00;
        }
        .dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .green-dot { background-color: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .red-dot { background-color: #ff4444; box-shadow: 0 0 8px #ff4444; }
        .yellow-dot { background-color: #ffaa00; box-shadow: 0 0 8px #ffaa00; }
        
        .peer-id-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 16px;
            margin: 20px auto;
            max-width: 400px;
            border: 1px solid #333;
        }
        .peer-id-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }
        .peer-id-value {
            font-size: 18px;
            font-weight: bold;
            background: #0a0a0a;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            word-break: break-all;
            letter-spacing: 0.5px;
        }
        .copy-btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
        }
        .copy-btn:active {
            transform: scale(0.96);
        }
        .instructions {
            color: #666;
            font-size: 12px;
            margin-top: 20px;
        }
        button {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📹 Live Camera Stream</h1>
        
        <!-- Video Player -->
        <video id="video" autoplay playsinline muted></video>
        
        <!-- Status -->
        <div class="status waiting" id="status">
            <span class="dot yellow-dot" id="statusDot"></span>
            <span id="statusText">🟡 Initializing...</span>
        </div>
        
        <!-- Peer ID Card - Yahaan Dikhega Peer ID -->
        <div class="peer-id-card" id="peerIdCard">
            <div class="peer-id-label">🔑 YOUR PEER ID (Share with phone)</div>
            <div class="peer-id-value" id="peerIdValue">Loading...</div>
            <button class="copy-btn" onclick="copyPeerId()">📋 Copy Peer ID</button>
        </div>
        
        <div class="instructions">
            📱 Step 1: Copy this Peer ID<br>
            📱 Step 2: Paste in the Phone App<br>
            📱 Step 3: Stream will start automatically
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        let peer;
        let activeCall = null;
        let currentPeerId = null;
        
        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const peerIdSpan = document.getElementById('peerIdValue');
        
        function updateStatus(state, text) {
            if (state === 'connected') {
                statusDiv.className = 'status connected';
                statusDot.className = 'dot green-dot';
            } else if (state === 'waiting') {
                statusDiv.className = 'status waiting';
                statusDot.className = 'dot yellow-dot';
            } else {
                statusDiv.className = 'status disconnected';
                statusDot.className = 'dot red-dot';
            }
            statusText.innerText = text;
        }
        
        function copyPeerId() {
            if (currentPeerId) {
                navigator.clipboard.writeText(currentPeerId);
                alert('✅ Peer ID copied: ' + currentPeerId);
            }
        }
        
        // Initialize PeerJS
        function initializePeer() {
            updateStatus('waiting', '🟡 Connecting to PeerJS server...');
            
            // Generate a unique random ID
            const randomId = 'viewer_' + Math.random().toString(36).substring(2, 15);
            
            peer = new Peer(randomId, {
                host: '0.peerjs.com',
                port: 443,
                path: '/',
                secure: true,
                debug: 2,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' }
                    ]
                }
            });
            
            // 🔥 PEER ID GENERATED — YAHAN PEER ID DIKHEGI 🔥
            peer.on('open', (id) => {
                console.log('PeerJS connected! Peer ID:', id);
                currentPeerId = id;
                peerIdSpan.innerText = id;
                updateStatus('waiting', '✅ Ready! Waiting for phone to connect...');
            });
            
            // Receive call from phone
            peer.on('call', (call) => {
                console.log('📞 Incoming call from:', call.peer);
                updateStatus('waiting', '📱 Phone connecting...');
                
                call.answer();
                activeCall = call;
                
                call.on('stream', (stream) => {
                    console.log('🎥 Stream received!');
                    video.srcObject = stream;
                    updateStatus('connected', '✅ LIVE! Stream active');
                });
                
                call.on('close', () => {
                    console.log('Call ended');
                    video.srcObject = null;
                    updateStatus('waiting', '⚪ Stream ended. Waiting for phone...');
                    activeCall = null;
                });
            });
            
            peer.on('error', (err) => {
                console.error('PeerJS error:', err);
                updateStatus('disconnected', '❌ Error: ' + err.type);
            });
            
            peer.on('disconnected', () => {
                console.log('PeerJS disconnected');
                updateStatus('disconnected', '❌ Disconnected. Reconnecting...');
                peer.reconnect();
            });
        }
        
        // Start
        initializePeer();
    </script>
</body>
</html>
