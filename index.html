<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
</head>
<body>
    <h1>Cloudinary Test</h1>
    <div id="result">Loading...</div>
    
    <script>
        const CLOUD_NAME = "dypwj2dhh";
        const FOLDER = "live_cams";
        
        async function test() {
            try {
                // Try Cloudinary API
                const url = `https://res.cloudinary.com/${CLOUD_NAME}/video/list/${FOLDER}.json`;
                const res = await fetch(url);
                const text = await res.text();
                document.getElementById('result').innerHTML = `<pre>${text}</pre>`;
            } catch(e) {
                document.getElementById('result').innerHTML = `Error: ${e.message}`;
            }
        }
        
        test();
    </script>
</body>
</html>
