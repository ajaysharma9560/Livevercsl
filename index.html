<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ludo Cam - Live Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #0f0f0f;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid #222;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* Header */
        .header {
            padding: 20px;
            background: #141414;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
        }

        .logo span {
            color: #00ff88;
        }

        /* Status Bar */
        .status-bar {
            padding: 12px 20px;
            background: #0f0f0f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .dot.red {
            background: #ff4444;
            box-shadow: 0 0 8px #ff4444;
        }

        .dot.green {
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
        }

        .status-text {
            color: #fff;
            font-size: 12px;
            font-weight: 500;
        }

        .device-name {
            color: #00ff88;
            font-size: 11px;
            font-family: monospace;
        }

        /* Video Section */
        .video-section {
            padding: 20px;
            background: #000;
        }

        .section-title {
            color: #888;
            font-size: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-btn {
            background: #1a1a1a;
            border: none;
            color: #00ff88;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
        }

        .refresh-btn:active {
            transform: scale(0.95);
        }

        .video-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .video-card {
            background: #0a0a0a;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .video-wrapper {
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
            cursor: pointer;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.6);
            transition: all 0.3s ease;
        }

        .play-overlay.hidden {
            display: none;
        }

        .play-btn {
            width: 55px;
            height: 55px;
            background: #00ff88;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0,255,136,0.5);
            transition: transform 0.2s;
        }

        .play-btn:active {
            transform: scale(0.9);
        }

        .play-btn span {
            font-size: 28px;
            color: #000;
            margin-left: 4px;
        }

        .video-info {
            padding: 10px;
            color: #666;
            font-size: 11px;
            text-align: center;
            border-top: 1px solid #222;
        }

        /* Footer */
        .footer {
            padding: 12px;
            text-align: center;
            font-size: 10px;
            color: #444;
            border-top: 1px solid #222;
        }

        .loading {
            text-align: center;
            color: #888;
            padding: 40px;
        }

        .no-videos {
            text-align: center;
            color: #555;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">📹 <span>LUDO</span> CAM</div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">
                <div class="dot red" id="statusDot"></div>
                <span class="status-text" id="statusText">Offline</span>
            </div>
            <div class="device-name" id="deviceName">—</div>
        </div>

        <!-- Video Section -->
        <div class="video-section">
            <div class="section-title">
                <span>📹 LIVE STREAMS</span>
                <button class="refresh-btn" onclick="fetchVideos()">⟳ REFRESH</button>
            </div>
            <div class="video-list" id="videoList">
                <div class="loading">Loading videos...</div>
            </div>
        </div>

        <div class="footer">
            🔒 Tap PLAY button to watch video • Auto-refresh every 10 sec
        </div>
    </div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script>
        // ========== CONFIGURATION ==========
        const SIGNAL_SERVER = "https://server-2-hwtd.onrender.com";
        const CLOUD_NAME = "dypwj2dhh";
        const FOLDER = "live_cams";
        // ====================================

        // DOM Elements
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const deviceNameSpan = document.getElementById('deviceName');
        const videoList = document.getElementById('videoList');

        let videoElements = [];

        // ========== ONLINE STATUS (SOCKET.IO) ==========
        const socket = io(SIGNAL_SERVER, {
            transports: ['websocket'],
            reconnection: true
        });

        socket.on('status', (data) => {
            if (data.online) {
                statusDot.className = 'dot green';
                statusText.innerText = 'Live';
                deviceNameSpan.innerText = `📱 ${data.deviceName}`;
                console.log('✅ Device Online:', data.deviceName);
            } else {
                statusDot.className = 'dot red';
                statusText.innerText = 'Offline';
                deviceNameSpan.innerText = '—';
                console.log('❌ Device Offline');
            }
        });

        socket.on('connect', () => {
            console.log('✅ Connected to signaling server');
        });

        socket.on('connect_error', (err) => {
            console.error('❌ Connection error:', err.message);
        });

        // ========== VIDEO PLAY HANDLER ==========
        function setupVideoCard(videoElement, overlayElement) {
            // PLAY BUTTON CLICK - Video play karo
            overlayElement.addEventListener('click', (e) => {
                e.stopPropagation();
                
                // Pause all other videos
                videoElements.forEach(v => {
                    if (v !== videoElement && !v.paused) {
                        v.pause();
                        const parentCard = v.closest('.video-card');
                        const otherOverlay = parentCard?.querySelector('.play-overlay');
                        if (otherOverlay) otherOverlay.classList.remove('hidden');
                    }
                });
                
                // Play current video
                videoElement.play().then(() => {
                    overlayElement.classList.add('hidden');
                    console.log('▶ Video playing');
                }).catch(err => {
                    console.error('Play error:', err);
                });
            });
            
            // Video end hone par play button wapas dikhao
            videoElement.addEventListener('ended', () => {
                overlayElement.classList.remove('hidden');
                console.log('⏹ Video ended');
            });
            
            // Video pause hone par (user ne pause kiya)
            videoElement.addEventListener('pause', () => {
                if (videoElement.currentTime === videoElement.duration) return;
                overlayElement.classList.remove('hidden');
            });
            
            // Video error handling
            videoElement.addEventListener('error', (err) => {
                console.error('Video error:', err);
                overlayElement.classList.remove('hidden');
            });
        }

        // ========== FETCH VIDEOS FROM CLOUDINARY ==========
        async function fetchVideos() {
            try {
                const url = `https://res.cloudinary.com/${CLOUD_NAME}/video/list/${FOLDER}.json`;
                console.log('📹 Fetching videos from:', url);
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.resources && data.resources.length > 0) {
                    // Latest videos first (reverse order)
                    const videos = [...data.resources].reverse();
                    console.log(`📹 Found ${videos.length} videos`);
                    
                    videoList.innerHTML = videos.map((video, index) => `
                        <div class="video-card" data-id="${index}">
                            <div class="video-wrapper">
                                <video id="video-${index}" preload="metadata" muted playsinline>
                                    <source src="${video.secure_url}" type="video/mp4">
                                    Your browser does not support the video tag.
                                </video>
                                <div class="play-overlay" id="overlay-${index}">
                                    <div class="play-btn">
                                        <span>▶</span>
                                    </div>
                                </div>
                            </div>
                            <div class="video-info">
                                📅 ${new Date(video.created_at).toLocaleString()}
                            </div>
                        </div>
                    `).join('');
                    
                    // Setup event listeners for each video
                    videoElements = [];
                    for (let i = 0; i < videos.length; i++) {
                        const video = document.getElementById(`video-${i}`);
                        const overlay = document.getElementById(`overlay-${i}`);
                        if (video && overlay) {
                            videoElements.push(video);
                            setupVideoCard(video, overlay);
                        }
                    }
                } else {
                    videoList.innerHTML = '<div class="no-videos">📭 No videos yet. Waiting for stream...</div>';
                }
            } catch (error) {
                console.error('❌ Error fetching videos:', error);
                videoList.innerHTML = '<div class="no-videos">⚠️ Error loading videos. Check Cloudinary settings.</div>';
            }
        }

        // Auto-refresh videos every 10 seconds
        fetchVideos();
        setInterval(fetchVideos, 10000);
        
        console.log('✅ Ludo Cam Ready — Green dot = Phone online, Tap PLAY button to watch video');
    </script>
</body>
</html>
