<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live Camera Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📷 Live Camera Monitor</h1>
            <div class="status-group">
                <div class="status-card">
                    <div class="dot" id="deviceDot"></div>
                    <span id="deviceStatus">Offline</span>
                </div>
                <div class="status-card">
                    <div class="dot" id="cameraDot"></div>
                    <span id="cameraStatus">Inactive</span>
                </div>
                <div class="res-badge" id="resBadge">240p</div>
            </div>
        </div>

        <div class="video-area">
            <img id="liveImg" src="">
            <div id="noStreamMsg" class="no-stream">
                📭 No active stream<br>
                Click START to begin
            </div>
        </div>

        <div class="button-group">
            <button id="startLiveBtn" class="btn green">▶ START LIVE</button>
            <button id="stopLiveBtn" class="btn red" disabled>⏹ STOP LIVE</button>
        </div>

        <div class="settings">
            <div class="setting-row">
                <label>📐 Resolution:</label>
                <div class="res-options">
                    <button class="res-opt" data-res="120p">120p 💾</button>
                    <button class="res-opt active" data-res="240p">240p 📱</button>
                    <button class="res-opt" data-res="360p">360p 🎥</button>
                </div>
            </div>
            <button id="flipCamBtn" class="flip-btn">🔄 Flip Camera</button>
        </div>

        <div class="info-bar">
            <span>📱 Device: device001</span>
            <span>🕐 Last: <span id="lastSeenTime">Never</span></span>
            <span>📊 Data: <span id="dataMode">Medium</span></span>
            <span id="streamStateText" class="idle">⚪ Idle</span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
