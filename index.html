<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Status Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        
        .container {
            background: #1e293b;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            min-width: 350px;
        }
        
        /* Status Box - Sahi size mein */
        .status-box {
            width: 180px;
            height: 180px;
            border-radius: 20px;
            margin: 20px auto;
            transition: all 0.3s ease;
        }
        
        /* Red color - Jab app band hai */
        .status-box.red {
            background-color: #ef4444;
            box-shadow: 0 0 15px rgba(239,68,68,0.3);
        }
        
        /* Green color - Jab app active hai */
        .status-box.green {
            background-color: #22c55e;
            box-shadow: 0 0 20px rgba(34,197,94,0.4);
        }
        
        /* Gray - Loading state */
        .status-box.checking {
            background-color: #475569;
        }
        
        .status-text {
            font-size: 24px;
            font-weight: bold;
            margin: 15px 0;
        }
        
        .status-text.red-text {
            color: #ef4444;
        }
        
        .status-text.green-text {
            color: #22c55e;
        }
        
        .device-info {
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .device-info p {
            color: #94a3b8;
            font-size: 14px;
            margin: 5px 0;
        }
        
        .device-info span {
            color: #f1f5f9;
            font-weight: bold;
        }
        
        button {
            margin-top: 15px;
            padding: 10px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        button:hover {
            background: #2563eb;
        }
        
        h1 {
            color: #f1f5f9;
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: #0f172a;
            border-radius: 20px;
            font-size: 12px;
            color: #94a3b8;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 App Status Monitor</h1>
        
        <!-- Status Box -->
        <div class="status-box checking" id="statusBox"></div>
        
        <!-- Status Text -->
        <div class="status-text" id="statusText">Checking...</div>
        
        <!-- Device Information -->
        <div class="device-info">
            <p>📱 <strong>Active Device:</strong> <span id="deviceId">None</span></p>
            <p>🕐 <strong>Last Update:</strong> <span id="lastUpdate">--:--:--</span></p>
            <p>🖥️ <strong>Server Time:</strong> <span id="serverTime">--:--:--</span></p>
        </div>
        
        <div class="badge" id="deviceCount">No device connected</div>
        
        <button onclick="refreshStatus()">🔄 Refresh Now</button>
    </div>

    <script>
        let activeDevices = new Set();  // Multiple devices track karne ke liye
        
        async function checkStatus() {
            try {
                const response = await fetch('/api/update-status');
                const data = await response.json();
                
                const box = document.getElementById('statusBox');
                const statusText = document.getElementById('statusText');
                const deviceSpan = document.getElementById('deviceId');
                const deviceCountSpan = document.getElementById('deviceCount');
                
                // Multiple devices handle karna
                if(data.activeDevices && data.activeDevices.length > 0) {
                    // Koi bhi device active hai to GREEN
                    box.className = 'status-box green';
                    statusText.innerHTML = '✅ ACTIVE';
                    statusText.className = 'status-text green-text';
                    
                    // Show active devices
                    const deviceNames = data.activeDevices.join(', ');
                    deviceSpan.innerHTML = deviceNames;
                    deviceCountSpan.innerHTML = `📱 ${data.activeDevices.length} device(s) active`;
                    
                } else if(data.status === 'active') {
                    // Single device active
                    box.className = 'status-box green';
                    statusText.innerHTML = '✅ ACTIVE';
                    statusText.className = 'status-text green-text';
                    deviceSpan.innerHTML = data.deviceId || 'Android Device';
                    deviceCountSpan.innerHTML = '📱 1 device active';
                    
                } else {
                    // No device active
                    box.className = 'status-box red';
                    statusText.innerHTML = '❌ OFFLINE';
                    statusText.className = 'status-text red-text';
                    deviceSpan.innerHTML = 'None';
                    deviceCountSpan.innerHTML = '⭕ No device connected';
                }
                
                document.getElementById('lastUpdate').innerHTML = new Date().toLocaleTimeString();
                document.getElementById('serverTime').innerHTML = new Date().toLocaleTimeString();
                
            } catch(error) {
                console.error('Error:', error);
                document.getElementById('statusBox').className = 'status-box red';
                document.getElementById('statusText').innerHTML = '⚠️ ERROR';
                document.getElementById('statusText').className = 'status-text red-text';
                document.getElementById('deviceId').innerHTML = 'Connection failed';
                document.getElementById('lastUpdate').innerHTML = new Date().toLocaleTimeString();
            }
        }
        
        async function refreshStatus() {
            await checkStatus();
            const btn = document.querySelector('button');
            btn.textContent = '✓ Refreshed!';
            setTimeout(() => {
                btn.textContent = '🔄 Refresh Now';
            }, 1500);
        }
        
        // Har 5 second mein auto check
        setInterval(checkStatus, 5000);
        checkStatus();
    </script>
</body>
</html>
