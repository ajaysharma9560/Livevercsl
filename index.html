<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔴 LIVE - Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, sans-serif;
        }

        .live-container {
            position: relative;
            width: 100%;
            max-width: 550px;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
        }

        .video-wrapper {
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .live-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .live-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #ff0000;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 30px;
            z-index: 100;
            font-family: monospace;
            animation: blink 1.2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; background: #ff0000; }
            50% { opacity: 0.7; background: #cc0000; }
            100% { opacity: 1; background: #ff0000; }
        }

        .controls-bar {
            background: #1a1a1a;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
        }

        .btn-play {
            background: #00ff88;
            color: #000;
        }

        .btn-stop {
            background: #ff4444;
            color: #fff;
        }

        .quality-section {
            background: #1a1a1a;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
        }

        .quality-select {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            padding: 8px 16px;
            border-radius: 24px;
            cursor: pointer;
        }

        .status-row {
            background: #111;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-family: monospace;
            color: #555;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
            display: inline-block;
            margin-right: 6px;
        }

        .status-dot.green {
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
        }

        .status-text {
            color: #fff;
        }

        .device-name {
            color: #00ff88;
        }

        video::-webkit-media-controls {
            display: none !important;
        }

        .debug-info {
            background: #0a0a0a;
            padding: 10px;
            font-size: 10px;
            color: #888;
            font-family: monospace;
            border-top: 1px solid #222;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="live-container">
    <div class="video-wrapper">
        <video id="liveVideo" class="live-video" autoplay muted playsinline disablePictureInPicture></video>
        <div class="live-badge">🔴 LIVE</div>
    </div>

    <div class="status-row">
        <div>
            <span class="status-dot green" id="statusDot"></span>
            <span class="status-text" id="statusText">LIVE</span>
        </div>
        <div class="device-name" id="deviceName">Camera</div>
    </div>

    <div class="quality-section">
        <span>🎥 QUALITY</span>
        <select class="quality-select" id="qualitySelect">
            <option value="120p">120p</option>
            <option value="240p">240p</option>
            <option value="360p" selected>360p</option>
            <option value="480p">480p</option>
            <option value="720p">720p</option>
        </select>
    </div>

    <div class="controls-bar">
        <button class="btn btn-play" id="playBtn">▶ PLAY</button>
        <button class="btn btn-stop" id="stopBtn">⏹ STOP</button>
    </div>

    <div class="debug-info" id="debugInfo">
        🔍 Waiting for video URL...
    </div>
</div>

<script>
    // ============================================================
    // TEST MODE - DIRECT VIDEO URL
    // ============================================================
    
    const video = document.getElementById('liveVideo');
    const playBtn = document.getElementById('playBtn');
    const stopBtn = document.getElementById('stopBtn');
    const qualitySelect = document.getElementById('qualitySelect');
    const debugInfo = document.getElementById('debugInfo');
    const deviceNameSpan = document.getElementById('deviceName');
    
    let isPlaying = false;
    
    // 🔥 YAHAN APNA VIDEO URL DALO - TEST KARNE KE LIYE
    // Cloudinary se jo video URL milta hai, woh yahan paste karo
    
    const TEST_VIDEO_URL = "https://res.cloudinary.com/demo/video/upload/sample.mp4";
    
    // Agar tumhare paas koi working video URL hai toh upar wali line mein daalo
    // Nahi toh yeh sample video chalegi (Cloudinary demo video)
    
    debugInfo.innerHTML = `🔍 Trying to load: ${TEST_VIDEO_URL}`;
    
    // Load test video
    video.src = TEST_VIDEO_URL;
    video.load();
    
    // Try to play
    video.play().then(() => {
        isPlaying = true;
        debugInfo.innerHTML = `✅ Video playing! URL: ${TEST_VIDEO_URL}`;
        deviceNameSpan.innerHTML = "📱 Live Camera";
    }).catch((error) => {
        debugInfo.innerHTML = `❌ Error: ${error.message}<br>URL: ${TEST_VIDEO_URL}<br><br>💡 Solution: Check if video URL is valid or replace TEST_VIDEO_URL with your Cloudinary URL`;
        console.error('Video error:', error);
    });
    
    // Play button
    playBtn.addEventListener('click', () => {
        if (video.paused) {
            video.play().then(() => {
                isPlaying = true;
                debugInfo.innerHTML = `✅ Playing: ${video.src}`;
            }).catch(e => {
                debugInfo.innerHTML = `❌ Play failed: ${e.message}`;
            });
        }
    });
    
    // Stop button
    stopBtn.addEventListener('click', () => {
        if (!video.paused) {
            video.pause();
            isPlaying = false;
            debugInfo.innerHTML = `⏸ Stopped at ${video.currentTime.toFixed(1)}s`;
        }
    });
    
    // Quality change (just UI for now)
    qualitySelect.addEventListener('change', (e) => {
        debugInfo.innerHTML = `🎥 Quality changed to ${e.target.value} (command would send to app)`;
    });
    
    // Video end - try to replay or show message
    video.addEventListener('ended', () => {
        debugInfo.innerHTML = `⚠️ Video ended. Add next video URL or loop.`;
        isPlaying = false;
    });
    
    // Video error
    video.addEventListener('error', (e) => {
        debugInfo.innerHTML = `❌ Video error! Check if URL is valid.`;
    });
    
    console.log('Test mode active - Replace TEST_VIDEO_URL with your Cloudinary video URL');
</script>
</body>
</html>
